---
- name: Stat CA certificate source
  ansible.builtin.stat:
    path: "{{ cert_renew_ca_src_crt }}"
  register: ca_crt_stat

- name: Fail if CA certificate source not found
  ansible.builtin.fail:
    msg: "CA certificate not found: {{ cert_renew_ca_src_crt }}"
  when: not ca_crt_stat.stat.exists

- name: Stat CA private key source
  ansible.builtin.stat:
    path: "{{ cert_renew_ca_src_key }}"
  register: ca_key_stat
  no_log: true

- name: Fail if CA private key source not found
  ansible.builtin.fail:
    msg: "CA private key not found: {{ cert_renew_ca_src_key }}"
  when: not ca_key_stat.stat.exists
  no_log: true

- name: Fail if CA private key permissions are too open
  ansible.builtin.fail:
    msg: "CA private key {{ cert_renew_ca_src_key }} must be mode 0600, got {{ ca_key_stat.stat.mode }}"
  when: ca_key_stat.stat.mode != '0600'
  no_log: true

- name: Create CA staging directories on tmpfs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ cert_renew_ca_dir }}"
    - "{{ cert_renew_ca_dir }}/certs"

- name: Copy CA certificate to tmpfs
  ansible.builtin.copy:
    src: "{{ cert_renew_ca_src_crt }}"
    dest: "{{ cert_renew_ca_dir }}/ca.crt"
    mode: "0600"
    remote_src: true

- name: Copy CA private key to tmpfs
  ansible.builtin.copy:
    src: "{{ cert_renew_ca_src_key }}"
    dest: "{{ cert_renew_ca_dir }}/ca.key"
    mode: "0600"
    remote_src: true
  no_log: true
