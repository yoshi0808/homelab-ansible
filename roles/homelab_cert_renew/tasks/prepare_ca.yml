---
- name: Verify homelab-ca-crt env var is set
  ansible.builtin.fail:
    msg: "Environment variable homelab-ca-crt is not set"
  when: lookup('env', 'homelab-ca-crt') | length == 0

- name: Verify homelab-ca-key env var is set
  ansible.builtin.fail:
    msg: "Environment variable homelab-ca-key is not set"
  when: lookup('env', 'homelab-ca-key') | length == 0
  no_log: true

- name: Create CA staging directories on tmpfs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ cert_renew_ca_dir }}"
    - "{{ cert_renew_ca_dir }}/certs"

- name: Write CA certificate
  ansible.builtin.shell:
    cmd: |
      echo "$HOMELAB_CA_CRT" | tr ' ' '\n' > {{ cert_renew_ca_dir }}/ca.crt
    executable: /bin/bash
  environment:
    HOMELAB_CA_CRT: "{{ lookup('env', 'homelab-ca-crt') }}"
  changed_when: true

- name: Write CA private key
  ansible.builtin.shell:
    cmd: |
      echo "$HOMELAB_CA_KEY" | tr ' ' '\n' > {{ cert_renew_ca_dir }}/ca.key
    executable: /bin/bash
  environment:
    HOMELAB_CA_KEY: "{{ lookup('env', 'homelab-ca-key') }}"
  changed_when: true
  no_log: true
