---
- name: restart semaphore
  ansible.builtin.systemd:
    name: semaphore
    state: restarted
  become: true

- name: restart pveproxy
  ansible.builtin.systemd:
    name: pveproxy
    state: restarted
  become: true

- name: update-ca-certificates
  ansible.builtin.command: update-ca-certificates
  changed_when: true
