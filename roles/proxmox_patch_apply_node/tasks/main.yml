---
# =============================================================================
# Safety gate: validate target_node before any work
# =============================================================================

- name: Validate target_node is pve1 or pve2
  ansible.builtin.assert:
    that:
      - target_node is defined
      - target_node in ['pve1', 'pve2']
    fail_msg: "target_node must be 'pve1' or 'pve2', got: '{{ target_node | default('undefined') }}'"
  delegate_to: localhost
  become: false

# =============================================================================
# Initialize: set all result facts before block so always-block can reference them
# =============================================================================

- name: Set run timestamp and initialize result facts
  ansible.builtin.set_fact:
    _apply_run_ts: "{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}"
    _apply_failed: false
    _apply_abort_type: "none"
    _apply_error_msg: ""
    _predryrun: {}
    _sim_updates: []
    _sim_removes: []
    _important_updates: []
    _new_vs_dryrun: []
    _unchanged_vs_dryrun: []
    _apply_stdout: ""
    _apply_collect: {}
    _reboot_required_before: false
    _apply_reboot_done: false
    _post_hc_status: "UNKNOWN"
    _pre_hc_status: "UNKNOWN"
    _running_on_target: []
    _mail_subject: "[UNKNOWN] {{ inventory_hostname }}: パッチ適用結果不明"
    _mail_body: "パッチ適用の結果を取得できませんでした。ログを確認してください。"
    _mail_send_result:
      failed: true
      msg: "mail send not attempted"
    _post_hc_retry_status: "CRITICAL"
    _post_hc_retry_json: {}

- name: Load mail variables
  ansible.builtin.include_vars:
    file: "{{ inventory_dir }}/../vars/mail.yml"
  delegate_to: localhost
  become: false
  ignore_errors: true

- name: Assert required mail variables are defined and non-empty
  ansible.builtin.assert:
    that:
      - smtp_host is defined
      - smtp_host | string | length > 0
      - smtp_port is defined
      - smtp_port | int > 0
      - smtp_user is defined
      - smtp_user | string | length > 0
      - smtp_password is defined
      - smtp_password | string | length > 0
      - mail_to is defined
      - mail_to | string | length > 0
    fail_msg: >-
      Required mail variables are missing or empty.
      Ensure inventories/vars/mail.yml exists and defines non-empty values for
      smtp_host, smtp_port (>0), smtp_user, smtp_password, mail_to.
      Aborting before patch apply to avoid silent mail failures.
  delegate_to: localhost
  become: false

- name: Ensure report directory exists
  ansible.builtin.file:
    path: "{{ proxmox_patch_apply_report_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

# =============================================================================
# Main block: Phases 1-3. Rescue catches any failure. Always runs Phase 4.
# =============================================================================

- block:

    # =========================================================================
    # Phase 1: Pre-check — control node placement
    # =========================================================================

    - name: Get cluster resources (VMs and CTs)
      ansible.builtin.command:
        cmd: pvesh get /cluster/resources --output-format json
      register: _pvesh_raw
      changed_when: false

    - name: Detect control node running on target
      ansible.builtin.set_fact:
        _control_node_vms: >-
          {{ _pvesh_raw.stdout | from_json |
             selectattr('type', 'defined') |
             selectattr('type', 'equalto', 'qemu') |
             selectattr('node', 'defined') |
             selectattr('node', 'equalto', inventory_hostname) |
             selectattr('name', 'defined') |
             selectattr('name', 'search', proxmox_patch_apply_control_node_name) |
             list }}

    - name: Abort if control node is on target
      when: _control_node_vms | length > 0
      block:
        - ansible.builtin.set_fact:
            _apply_abort_type: "control_node"
            _apply_error_msg: >-
              Control node '{{ proxmox_patch_apply_control_node_name }}' is running on
              {{ inventory_hostname }} ({{ _control_node_vms | map(attribute='name') | join(', ') }}).
              Cannot apply patch to a node hosting the control node.
        - ansible.builtin.fail:
            msg: "{{ _apply_error_msg }}"

    - name: Detect running VMs/CTs on target node (evacuation check)
      ansible.builtin.set_fact:
        _running_on_target: >-
          {{ _pvesh_raw.stdout | from_json |
             selectattr('type', 'defined') |
             selectattr('type', 'in', ['qemu', 'lxc']) |
             selectattr('node', 'defined') |
             selectattr('node', 'equalto', inventory_hostname) |
             selectattr('status', 'defined') |
             selectattr('status', 'equalto', 'running') |
             list }}

    - name: Abort if running VMs/CTs found on target (evacuation required)
      when: _running_on_target | length > 0
      block:
        - ansible.builtin.set_fact:
            _apply_abort_type: "vms_not_evacuated"
            _apply_error_msg: >-
              Running VMs/CTs found on {{ inventory_hostname }}:
              {{ _running_on_target | map(attribute='name') | join(', ') }}.
              Evacuate all VMs/CTs before applying patch.
        - ansible.builtin.fail:
            msg: "{{ _apply_error_msg }}"

    # =========================================================================
    # Phase 1: Pre-check — healthcheck gate
    # =========================================================================

    - name: Run pre-apply healthcheck
      ansible.builtin.include_role:
        name: proxmox_healthcheck

    - name: Record pre-healthcheck status
      ansible.builtin.set_fact:
        _pre_hc_status: "{{ proxmox_report.result.status }}"

    - name: Abort if healthcheck is not OK
      when: proxmox_report.result.status != 'OK'
      block:
        - ansible.builtin.set_fact:
            _apply_abort_type: "healthcheck"
            _apply_error_msg: >-
              Healthcheck {{ proxmox_report.result.status }} on {{ inventory_hostname }}:
              {{ (proxmox_report.result.criticals + proxmox_report.result.warnings) | join(' | ') }}
        - ansible.builtin.fail:
            msg: "{{ _apply_error_msg }}"

    # =========================================================================
    # Phase 2: Pre-apply dry-run
    # =========================================================================

    - name: Copy pre-apply dry-run collect script
      ansible.builtin.copy:
        src: proxmox-patch-predryrun-collect.sh
        dest: /usr/local/sbin/proxmox-patch-predryrun-collect.sh
        mode: "0750"
        owner: root
        group: root

    - name: Copy post-apply collect script
      ansible.builtin.copy:
        src: proxmox-patch-apply-collect.sh
        dest: /usr/local/sbin/proxmox-patch-apply-collect.sh
        mode: "0750"
        owner: root
        group: root

    - name: Run pre-apply dry-run collect
      ansible.builtin.command:
        cmd: /usr/local/sbin/proxmox-patch-predryrun-collect.sh
      register: _predryrun_raw
      changed_when: false

    - name: Parse pre-apply dry-run JSON
      ansible.builtin.set_fact:
        _predryrun: "{{ _predryrun_raw.stdout | from_json }}"

    - name: Abort if apt-get update failed
      when: not (_predryrun.apt_update_ok | bool)
      block:
        - ansible.builtin.set_fact:
            _apply_abort_type: "apt_update"
            _apply_error_msg: "apt-get update failed: {{ _predryrun.apt_update_output | truncate(400) }}"
        - ansible.builtin.fail:
            msg: "{{ _apply_error_msg }}"

    - name: Abort if apt-get check failed
      when: not (_predryrun.apt_check_ok | bool)
      block:
        - ansible.builtin.set_fact:
            _apply_abort_type: "apt_check"
            _apply_error_msg: "apt-get check failed: {{ _predryrun.apt_check_output | truncate(400) }}"
        - ansible.builtin.fail:
            msg: "{{ _apply_error_msg }}"

    - name: Abort if apt simulation failed
      when: not (_predryrun.sim_ok | bool)
      block:
        - ansible.builtin.set_fact:
            _apply_abort_type: "sim_failed"
            _apply_error_msg: "apt-get -s dist-upgrade failed on {{ inventory_hostname }}"
        - ansible.builtin.fail:
            msg: "{{ _apply_error_msg }}"

    - name: Parse simulation output for package changes
      ansible.builtin.set_fact:
        _sim_updates: >-
          {{ _predryrun.sim_output.splitlines() |
             select('match', '^Inst ') |
             map('regex_replace', '^Inst (\S+).*', '\1') | list }}
        _sim_removes: >-
          {{ _predryrun.sim_output.splitlines() |
             select('match', '^Remv ') |
             map('regex_replace', '^Remv (\S+).*', '\1') | list }}

    - name: Detect important components in update list
      ansible.builtin.set_fact:
        _important_updates: >-
          {{ (_sim_updates | select('in', proxmox_patch_apply_important_components) | list) +
             (_sim_updates | select('match', '^(' + (proxmox_patch_apply_important_component_prefixes | join('|')) + ')') | list) }}

    - name: Determine if re-dry-run shows MAINTENANCE_REQUIRED
      ansible.builtin.set_fact:
        _redryrun_is_mr: >-
          {{ (_sim_updates | length > proxmox_patch_apply_major_upgrade_threshold | int) or
             (_important_updates | length > 0) or
             (_sim_removes | length > 0) }}
        _redryrun_mr_reason: >-
          {%- if _sim_updates | length > proxmox_patch_apply_major_upgrade_threshold | int -%}
          major upgrade suspected ({{ _sim_updates | length }} packages exceed threshold {{ proxmox_patch_apply_major_upgrade_threshold }})
          {%- elif _important_updates | length > 0 -%}
          important components detected: {{ _important_updates | unique | join(', ') }}
          {%- elif _sim_removes | length > 0 -%}
          removes detected: {{ _sim_removes | join(', ') }}
          {%- else -%}
          none
          {%- endif -%}

    # Compare with latest dry-run JSON when MAINTENANCE_REQUIRED
    - name: Find latest unified dry-run JSON
      ansible.builtin.set_fact:
        _latest_dryrun_packages: >-
          {%- set files = query('fileglob', proxmox_patch_dryrun_report_dir + '/*_unified_dryrun.json') | sort -%}
          {%- if files | length > 0 -%}
          {{ (lookup('file', files | last) | from_json).updates | map(attribute='name') | list }}
          {%- else -%}
          []
          {%- endif -%}
      when: _redryrun_is_mr | bool

    - name: Compute package diff vs latest dry-run
      ansible.builtin.set_fact:
        _new_vs_dryrun: "{{ _sim_updates | difference(_latest_dryrun_packages | default([])) }}"
        _unchanged_vs_dryrun: "{{ _sim_updates | intersect(_latest_dryrun_packages | default([])) }}"
      when: _redryrun_is_mr | bool

    - name: Abort if MAINTENANCE_REQUIRED detected (auto mode)
      when: (_redryrun_is_mr | bool) and proxmox_patch_apply_mode == 'auto'
      block:
        - ansible.builtin.set_fact:
            _apply_abort_type: "maintenance_required"
            _apply_error_msg: "MAINTENANCE_REQUIRED: {{ _redryrun_mr_reason }}"
        - ansible.builtin.fail:
            msg: "{{ _apply_error_msg }}"

    - name: Abort if manual mode used without explicit confirmation
      when: >-
        (_redryrun_is_mr | bool) and
        proxmox_patch_apply_mode == 'manual' and
        proxmox_patch_apply_manual_confirm != 'MAINTENANCE_REQUIRED'
      block:
        - ansible.builtin.set_fact:
            _apply_abort_type: "manual_not_confirmed"
            _apply_error_msg: >-
              apply_mode=manual requires explicit confirmation when MAINTENANCE_REQUIRED is detected.
              Add: -e proxmox_patch_apply_manual_confirm=MAINTENANCE_REQUIRED
        - ansible.builtin.fail:
            msg: "{{ _apply_error_msg }}"

    - name: Warn and continue (manual mode, confirmed)
      ansible.builtin.debug:
        msg: >-
          [WARNING] apply_mode=manual confirmed: MAINTENANCE_REQUIRED detected but continuing.
          Reason: {{ _redryrun_mr_reason }}
      when: >-
        (_redryrun_is_mr | bool) and
        proxmox_patch_apply_mode == 'manual' and
        proxmox_patch_apply_manual_confirm == 'MAINTENANCE_REQUIRED'

    # =========================================================================
    # Phase 2: Apply
    # =========================================================================

    - name: Set abort type for apply phase
      ansible.builtin.set_fact:
        _apply_abort_type: "apply_failed"

    - name: Apply patches (apt-get dist-upgrade)
      ansible.builtin.command:
        cmd: apt-get -y dist-upgrade
      environment:
        DEBIAN_FRONTEND: noninteractive
      register: _apply_raw
      changed_when: true

    - name: Record apply output
      ansible.builtin.set_fact:
        _apply_stdout: "{{ _apply_raw.stdout | default('') }}"
        _apply_abort_type: "none"

    - name: Run post-apply collect
      ansible.builtin.command:
        cmd: /usr/local/sbin/proxmox-patch-apply-collect.sh
      register: _apply_collect_raw
      changed_when: false

    - name: Parse post-apply collect JSON
      ansible.builtin.set_fact:
        _apply_collect: "{{ _apply_collect_raw.stdout | from_json }}"

    - name: Record reboot-required state
      ansible.builtin.set_fact:
        _reboot_required_before: "{{ _apply_collect.reboot_required | bool }}"

    # =========================================================================
    # Phase 3: Reboot
    # =========================================================================

    - name: Set abort type for reboot phase
      ansible.builtin.set_fact:
        _apply_abort_type: "reboot_timeout"
      when: _reboot_required_before | bool

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: "{{ proxmox_patch_apply_reboot_timeout }}"
        connect_timeout: 10
        pre_reboot_delay: 5
        post_reboot_delay: 30
        msg: "Rebooting for Proxmox patch apply"
      when: _reboot_required_before | bool

    - name: Record reboot done
      ansible.builtin.set_fact:
        _apply_reboot_done: "{{ _reboot_required_before | bool }}"
        _apply_abort_type: "none"
      when: _reboot_required_before | bool

  rescue:
    - name: Capture failure info
      ansible.builtin.set_fact:
        _apply_failed: true
        _apply_error_msg: >-
          {{ _apply_error_msg if _apply_error_msg | length > 0
             else (ansible_failed_result.msg | default('Unknown error')) }}

  # ===========================================================================
  # Phase 4: Post-healthcheck + report + email (always runs)
  # ===========================================================================

  always:
    - name: Run post-healthcheck script
      ansible.builtin.command:
        cmd: /usr/local/sbin/proxmox-healthcheck.sh
      register: _post_hc_raw
      changed_when: false
      ignore_errors: true

    - name: Parse post-healthcheck output
      ansible.builtin.set_fact:
        _post_hc_json: "{{ _post_hc_raw.stdout | from_json }}"
      ignore_errors: true
      when: _post_hc_raw is succeeded and (_post_hc_raw.stdout | length) > 0

    - name: Determine post-healthcheck status
      ansible.builtin.set_fact:
        _post_hc_status: >-
          {%- if _post_hc_raw is failed or _post_hc_json is not defined -%}
          UNKNOWN
          {%- elif not (_post_hc_json.cluster.quorate == 'Yes') or
                  not (_post_hc_json.apt.check_ok | bool) or
                  not (_post_hc_json.services.pve_cluster == 'active') or
                  not (_post_hc_json.services.corosync == 'active') or
                  not (_post_hc_json.services.pvedaemon == 'active') -%}
          CRITICAL
          {%- else -%}
          OK
          {%- endif -%}
      ignore_errors: true

    # Retry when CRITICAL or UNKNOWN after reboot: services may still be starting up,
    # or the healthcheck script itself may have failed transiently (UNKNOWN).
    # Loop runs range(retry_count+1) iterations; early stopping is handled inside
    # retry_healthcheck_once.yml via a block guard (when: _post_hc_retry_status != 'OK').
    - name: Retry post-healthcheck if CRITICAL or UNKNOWN after reboot
      ansible.builtin.include_tasks: retry_healthcheck_once.yml
      loop: "{{ range(proxmox_patch_apply_hc_retry_count | int + 1) | list }}"
      loop_control:
        loop_var: _post_hc_retry_idx
        label: "attempt {{ _post_hc_retry_idx + 1 }} of {{ proxmox_patch_apply_hc_retry_count | int + 1 }}"
      when:
        - _post_hc_status in ['CRITICAL', 'UNKNOWN']
        - _apply_reboot_done | bool

    - name: Re-determine post-healthcheck status after retry
      ansible.builtin.set_fact:
        _post_hc_status: "{{ _post_hc_retry_status }}"
      when: _post_hc_status in ['CRITICAL', 'UNKNOWN'] and (_apply_reboot_done | bool)

    - name: Set email subject and body
      ansible.builtin.set_fact:
        _mail_subject: >-
          {%- if _apply_abort_type == 'maintenance_required' -%}
          [ABORT] {{ inventory_hostname }}: 自動適用中止 - 更新内容が変化しました
          {%- elif _apply_abort_type in ['control_node', 'healthcheck', 'vms_not_evacuated', 'apt_update', 'apt_check', 'sim_failed', 'manual_not_confirmed'] -%}
          [ABORT] {{ inventory_hostname }}: 前提チェック失敗 ({{ _apply_abort_type }})
          {%- elif _apply_abort_type == 'apply_failed' -%}
          [FAILED] {{ inventory_hostname }}: apt-get dist-upgrade 失敗
          {%- elif _apply_abort_type == 'reboot_timeout' -%}
          [FAILED] {{ inventory_hostname }}: reboot 後の応答タイムアウト
          {%- elif _apply_failed | bool -%}
          [FAILED] {{ inventory_hostname }}: パッチ適用失敗
          {%- elif _post_hc_status != 'OK' -%}
          [WARNING] {{ inventory_hostname }}: パッチ適用完了 - post-healthcheck {{ _post_hc_status }}
          {%- else -%}
          [SUCCESS] {{ inventory_hostname }}: パッチ適用完了
          {%- endif -%}
        _mail_body: |
          Proxmox パッチ適用結果

          実行日時 : {{ _apply_run_ts }}
          対象ノード: {{ inventory_hostname }}
          結果      : {{ 'FAILED' if (_apply_failed | bool) else 'SUCCESS' }}

          =========================================
          Phase 1: 前提チェック
          =========================================
          pre-healthcheck: {{ _pre_hc_status }}
          {% if _apply_abort_type in ['control_node', 'healthcheck', 'vms_not_evacuated', 'manual_not_confirmed'] %}
          中止理由: {{ _apply_error_msg }}
          {% endif %}

          =========================================
          Phase 2: pre-apply dry-run
          =========================================
          {% if _predryrun %}
          apt_update_ok : {{ _predryrun.apt_update_ok | default('N/A') }}
          apt_check_ok  : {{ _predryrun.apt_check_ok | default('N/A') }}
          sim_ok        : {{ _predryrun.sim_ok | default('N/A') }}
          更新パッケージ数: {{ _sim_updates | length }}
          remove 数     : {{ _sim_removes | length }}
          {% else %}
          (未実施)
          {% endif %}
          {% if _apply_abort_type == 'maintenance_required' %}

          [ABORT] MAINTENANCE_REQUIRED 検出
          中止理由: {{ _apply_error_msg }}

          最新 dry-run から追加された更新候補:
          {% if _new_vs_dryrun | length > 0 %}
          {% for pkg in _new_vs_dryrun %}
            - {{ pkg }}
          {% endfor %}
          {% else %}
            (なし)
          {% endif %}

          最新 dry-run から変わらない更新候補:
          {% if _unchanged_vs_dryrun | length > 0 %}
          {% for pkg in _unchanged_vs_dryrun %}
            - {{ pkg }}
          {% endfor %}
          {% else %}
            (なし)
          {% endif %}

          対応方法: dry-run を再実行してください。
          {% endif %}
          {% if _apply_abort_type in ['apt_update', 'apt_check', 'sim_failed'] %}
          中止理由: {{ _apply_error_msg }}
          {% endif %}

          =========================================
          Phase 3: apply
          =========================================
          {% if not (_apply_abort_type in ['control_node', 'healthcheck', 'vms_not_evacuated', 'apt_update', 'apt_check', 'sim_failed', 'maintenance_required', 'manual_not_confirmed']) %}
          適用パッケージ数: {{ _sim_updates | length }}
          reboot 実施   : {{ _apply_reboot_done }}
          reboot trigger: {{ _apply_collect.reboot_trigger | default('') }}
          {% if _apply_abort_type in ['apply_failed', 'reboot_timeout'] %}
          エラー: {{ _apply_error_msg }}
          {% endif %}
          {% else %}
          (前提チェック失敗のため未実施)
          {% endif %}

          =========================================
          Phase 4: post-healthcheck
          =========================================
          post-healthcheck: {{ _post_hc_status }}
      delegate_to: localhost
      become: false
      ignore_errors: true

    - name: Send summary email
      community.general.mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user }}"
        password: "{{ smtp_password }}"
        to: "{{ mail_to }}"
        subject: "{{ _mail_subject }}"
        body: "{{ _mail_body }}"
        secure: starttls
      register: _mail_send_result
      delegate_to: localhost
      become: false
      ignore_errors: true

    - name: Build and save final report
      ansible.builtin.copy:
        content: "{{ {
            'run_timestamp': _apply_run_ts,
            'target_node': inventory_hostname,
            'result': 'FAILED' if (_apply_failed | bool) else 'SUCCESS',
            'abort_type': _apply_abort_type,
            'error_msg': _apply_error_msg,
            'pre_healthcheck_status': _pre_hc_status,
            'updates': _sim_updates,
            'removes': _sim_removes,
            'apply_output': _apply_stdout | truncate(3000),
            'reboot_done': _apply_reboot_done,
            'reboot_trigger': _apply_collect.reboot_trigger | default(''),
            'running_kernel': _apply_collect.running_kernel | default(''),
            'post_healthcheck_status': _post_hc_status,
            'mail_sent': not (_mail_send_result.failed | default(true) | bool),
            'mail_error': _mail_send_result.msg | default('')
          } | to_nice_json }}"
        dest: "{{ proxmox_patch_apply_report_dir }}/{{ _apply_run_ts }}_{{ inventory_hostname }}_apply.json"
      delegate_to: localhost
      become: false
      ignore_errors: true

    - name: Re-raise failure to mark play as failed
      ansible.builtin.fail:
        msg: >-
          {%- if _apply_failed | bool -%}
          proxmox_patch_apply_node failed: {{ _apply_error_msg }}
          {%- else -%}
          proxmox_patch_apply_node: apply succeeded but summary mail could not be sent:
          {{ _mail_send_result.msg | default('unknown error') }}
          {%- endif -%}
      when: (_apply_failed | bool) or (_mail_send_result.failed | default(true) | bool)
