---
- name: Copy proxmox healthcheck script
  ansible.builtin.copy:
    src: proxmox-healthcheck.sh
    dest: /usr/local/sbin/proxmox-healthcheck.sh
    mode: "0750"
    owner: root
    group: root

- name: Run proxmox healthcheck
  ansible.builtin.command:
    cmd: /usr/local/sbin/proxmox-healthcheck.sh
  register: healthcheck_raw
  changed_when: false

- name: Fail if healthcheck returned no output
  ansible.builtin.fail:
    msg: "proxmox-healthcheck.sh on {{ inventory_hostname }} returned empty output (rc={{ healthcheck_raw.rc }}). Run the script manually on the host to diagnose."
  when: healthcheck_raw.stdout | length == 0

- name: Parse healthcheck JSON
  ansible.builtin.set_fact:
    proxmox_health: "{{ healthcheck_raw.stdout | from_json }}"

- name: Compute replication thresholds (epoch)
  ansible.builtin.set_fact:
    _thresh_repl_critical: "{{ (ansible_facts['date_time']['epoch'] | int) - (proxmox_healthcheck_repl_critical_hours | int * 3600) }}"
    _thresh_repl_warning: "{{ (ansible_facts['date_time']['epoch'] | int) - (proxmox_healthcheck_repl_warning_hours | int * 3600) }}"

- name: Find stale replication jobs
  ansible.builtin.set_fact:
    _repl_critical_jobs: "{{ proxmox_health.replication.entries |
      selectattr('last_sync_epoch', 'lt', _thresh_repl_critical | int) |
      map(attribute='job_id') | list }}"
    _repl_warning_jobs: "{{ proxmox_health.replication.entries |
      rejectattr('last_sync_epoch', 'lt', _thresh_repl_critical | int) |
      selectattr('last_sync_epoch', 'lt', _thresh_repl_warning | int) |
      map(attribute='job_id') | list }}"

- name: Find degraded or faulted ZFS pools
  ansible.builtin.set_fact:
    _zfs_bad_pools: "{{ (proxmox_health.zfs.pools | selectattr('state', 'equalto', 'DEGRADED') | list) +
                        (proxmox_health.zfs.pools | selectattr('state', 'equalto', 'FAULTED') | list) }}"

- name: Classify criticals and warnings
  ansible.builtin.set_fact:
    proxmox_criticals: "{{ []
      + ([] if proxmox_health.cluster.quorate == 'Yes'
             else ['cluster has no quorum (quorate=' + proxmox_health.cluster.quorate + ')'])
      + ([] if proxmox_health.zfs.collection_ok
             else ['zpool status collection failed - ZFS state unknown'])
      + (_zfs_bad_pools | map(attribute='name') | map('regex_replace', '^(.*)$', 'ZFS pool degraded/faulted: \\1') | list)
      + ([] if proxmox_health.apt.check_ok
             else ['apt/dpkg broken: ' + (proxmox_health.apt.check_output | trim)])
      + ([] if proxmox_health.services.pve_cluster == 'active'
             else ['service pve-cluster is not active: ' + proxmox_health.services.pve_cluster])
      + ([] if proxmox_health.services.corosync == 'active'
             else ['service corosync is not active: ' + proxmox_health.services.corosync])
      + ([] if proxmox_health.services.pvedaemon == 'active'
             else ['service pvedaemon is not active: ' + proxmox_health.services.pvedaemon])
      + ([] if proxmox_health.services.pveproxy == 'active'
             else ['service pveproxy is not active: ' + proxmox_health.services.pveproxy])
      + ([] if proxmox_health.systemd.failed_count == 0
             else ['systemd failed units (' + (proxmox_health.systemd.failed_count | string) + '): ' +
                   (proxmox_health.systemd.failed_units | join(', '))])
      + ([] if proxmox_health.filesystem.root_used_pct | int >= 0
             else ['root filesystem usage collection failed (df returned -1)'])
      + ([] if proxmox_health.filesystem.root_used_pct | int < 0 or
               proxmox_health.filesystem.root_used_pct | int < proxmox_healthcheck_root_fs_critical_pct | int
             else ['root filesystem ' + (proxmox_health.filesystem.root_used_pct | string) + '% used (threshold=' +
                   (proxmox_healthcheck_root_fs_critical_pct | string) + '%)'])
      + (_repl_critical_jobs | map('regex_replace', '^(.*)$', 'replication stale (>24h): \\1') | list)
      }}"
    proxmox_warnings: "{{ []
      + (_repl_warning_jobs | map('regex_replace', '^(.*)$', 'replication stale (>2h): \\1') | list)
      + ([] if not proxmox_health.reboot_required
             else ['reboot-required flag is set'])
      + ([] if (proxmox_health.filesystem.root_used_pct | int < 0 or
                proxmox_health.filesystem.root_used_pct | int < proxmox_healthcheck_root_fs_warning_pct | int or
                proxmox_health.filesystem.root_used_pct | int >= proxmox_healthcheck_root_fs_critical_pct | int)
             else ['root filesystem ' + (proxmox_health.filesystem.root_used_pct | string) + '% used (threshold=' +
                   (proxmox_healthcheck_root_fs_warning_pct | string) + '%)'])
      }}"

- name: Build report
  ansible.builtin.set_fact:
    proxmox_report:
      host: "{{ inventory_hostname }}"
      collected_at: "{{ proxmox_health.collected_at }}"
      pve_version: "{{ proxmox_health.pve_version }}"
      cluster:
        quorate: "{{ proxmox_health.cluster.quorate }}"
      zfs:
        pools: "{{ proxmox_health.zfs.pools }}"
      replication:
        entries: "{{ proxmox_health.replication.entries }}"
      systemd:
        failed_count: "{{ proxmox_health.systemd.failed_count }}"
        failed_units: "{{ proxmox_health.systemd.failed_units }}"
      services: "{{ proxmox_health.services }}"
      filesystem:
        root_used_pct: "{{ proxmox_health.filesystem.root_used_pct }}"
      apt:
        check_ok: "{{ proxmox_health.apt.check_ok }}"
      reboot_required: "{{ proxmox_health.reboot_required }}"
      vms:
        list: "{{ proxmox_health.vms.list }}"
      cts:
        list: "{{ proxmox_health.cts.list }}"
      chrony:
        tracking: "{{ proxmox_health.chrony.tracking }}"
      result:
        status: "{{ 'CRITICAL' if proxmox_criticals | length > 0
                    else ('WARNING' if proxmox_warnings | length > 0
                    else 'OK') }}"
        criticals: "{{ proxmox_criticals }}"
        warnings: "{{ proxmox_warnings }}"

- name: Ensure report directory exists
  ansible.builtin.file:
    path: "{{ proxmox_healthcheck_report_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Save report
  ansible.builtin.copy:
    content: "{{ proxmox_report | to_nice_json }}"
    dest: "{{ proxmox_healthcheck_report_dir }}/{{ inventory_hostname }}_{{ ansible_facts['date_time']['iso8601_basic_short'] }}.json"
  delegate_to: localhost
  become: false

- name: Build Semaphore health summary
  ansible.builtin.set_fact:
    semaphore_health_summary: >-
      {% set summary = namespace(overall='OK', lines=[], warnings=[], criticals=[]) -%}
      {% for host in ansible_play_hosts -%}
      {% set report = hostvars[host].proxmox_report -%}
      {% if report.result.status == 'CRITICAL' -%}
      {% set summary.overall = 'CRITICAL' -%}
      {% elif report.result.status == 'WARNING' and summary.overall != 'CRITICAL' -%}
      {% set summary.overall = 'WARNING' -%}
      {% endif -%}
      {% for warning in report.result.warnings -%}
      {% set _ = summary.warnings.append(host ~ ': ' ~ warning) -%}
      {% endfor -%}
      {% for critical in report.result.criticals -%}
      {% set _ = summary.criticals.append(host ~ ': ' ~ critical) -%}
      {% endfor -%}
      {% endfor -%}
      {% set _ = summary.lines.append('============================================================') -%}
      {% set _ = summary.lines.append('SUMMARY proxmox_healthcheck') -%}
      {% set _ = summary.lines.append('============================================================') -%}
      {% set _ = summary.lines.append('Overall: ' ~ summary.overall) -%}
      {% set _ = summary.lines.append('') -%}
      {% set _ = summary.lines.append('Checked:') -%}
      {% set _ = summary.lines.append('  - Cluster quorum') -%}
      {% set _ = summary.lines.append('  - ZFS pool state') -%}
      {% set _ = summary.lines.append('  - Proxmox services') -%}
      {% set _ = summary.lines.append('  - systemd failed units') -%}
      {% set _ = summary.lines.append('  - root filesystem usage') -%}
      {% set _ = summary.lines.append('  - apt/dpkg health') -%}
      {% set _ = summary.lines.append('  - reboot-required flag') -%}
      {% set _ = summary.lines.append('  - replication freshness') -%}
      {% set _ = summary.lines.append('') -%}
      {% set _ = summary.lines.append('Hosts:') -%}
      {% for host in ansible_play_hosts -%}
      {% set report = hostvars[host].proxmox_report -%}
      {% set services_ok = (
          report.services.pve_cluster == 'active' and
          report.services.corosync == 'active' and
          report.services.pvedaemon == 'active' and
          report.services.pveproxy == 'active') -%}
      {% set zfs = namespace(items=[]) -%}
      {% for pool in report.zfs.pools -%}
      {% set _ = zfs.items.append(pool.name ~ ':' ~ pool.state) -%}
      {% endfor -%}
      {% set _ = summary.lines.append('  ' ~ host ~ ': ' ~ report.result.status ~
          ' | quorum=' ~ report.cluster.quorate ~
          ' | zfs=' ~ (zfs.items | join(',') if zfs.items | length > 0 else 'none') ~
          ' | root=' ~ (report.filesystem.root_used_pct | string) ~ '%' ~
          ' | services=' ~ ('OK' if services_ok else 'NOT_OK') ~
          ' | failed_units=' ~ (report.systemd.failed_count | string) ~
          ' | reboot=' ~ (report.reboot_required | string | lower)) -%}
      {% endfor -%}
      {% set _ = summary.lines.append('') -%}
      {% set _ = summary.lines.append('Warnings:') -%}
      {% if summary.warnings | length == 0 -%}
      {% set _ = summary.lines.append('  none') -%}
      {% else -%}
      {% for warning in summary.warnings -%}
      {% set _ = summary.lines.append('  - ' ~ warning) -%}
      {% endfor -%}
      {% endif -%}
      {% set _ = summary.lines.append('') -%}
      {% set _ = summary.lines.append('Criticals:') -%}
      {% if summary.criticals | length == 0 -%}
      {% set _ = summary.lines.append('  none') -%}
      {% else -%}
      {% for critical in summary.criticals -%}
      {% set _ = summary.lines.append('  - ' ~ critical) -%}
      {% endfor -%}
      {% endif -%}
      {% set _ = summary.lines.append('') -%}
      {% set _ = summary.lines.append('Next:') -%}
      {% if summary.overall == 'CRITICAL' -%}
      {% set _ = summary.lines.append('  fix criticals; patch must not proceed') -%}
      {% elif summary.overall == 'WARNING' -%}
      {% set _ = summary.lines.append('  review warnings before patch') -%}
      {% else -%}
      {% set _ = summary.lines.append('  none') -%}
      {% endif -%}
      {% set _ = summary.lines.append('============================================================') -%}
      {{ {'overall': summary.overall, 'lines': summary.lines} }}
  run_once: true

- name: Set Semaphore health summary lines
  ansible.builtin.set_fact:
    semaphore_health_summary_overall: "{{ semaphore_health_summary.overall }}"
    semaphore_health_summary_lines: "{{ semaphore_health_summary.lines }}"
    semaphore_health_summary_text: "{{ semaphore_health_summary.lines | join('\n') }}"
  run_once: true

- name: Print Semaphore health summary before critical fail
  ansible.builtin.command:
    argv:
      - /usr/bin/printf
      - "%s\n"
      - "{{ semaphore_health_summary_text }}"
  changed_when: false
  when: semaphore_health_summary_overall == 'CRITICAL'
  run_once: true

- name: Fail if critical
  ansible.builtin.fail:
    msg: "CRITICAL on {{ inventory_hostname }}: {{ proxmox_criticals | join(' | ') }}"
  when: proxmox_criticals | length > 0

- name: Print Semaphore health summary
  ansible.builtin.command:
    argv:
      - /usr/bin/printf
      - "%s\n"
      - "{{ semaphore_health_summary_text }}"
  changed_when: false
  when: semaphore_health_summary_overall != 'CRITICAL'
  run_once: true
