---
# target_setup.yml: Sets up recovery-exec user, dispatch/action scripts,
# and SSH authorized_keys on each target node (authy, monnie).
# Called from main.yml when recovery_exec_setup_targets is true.
#
# Runs on: ansy/quory (for slurp + known_hosts) and delegates to target nodes.

# ---------------------------------------------------------------------------
# Read public keys generated by main.yml
# ---------------------------------------------------------------------------

- name: Slurp investigate public key
  ansible.builtin.slurp:
    src: "{{ recovery_exec_investigate_key }}.pub"
  register: _investigate_pubkey
  become: true

- name: Slurp action public key
  ansible.builtin.slurp:
    src: "{{ recovery_exec_action_key }}.pub"
  register: _action_pubkey
  become: true

# ---------------------------------------------------------------------------
# Per-target setup
# ---------------------------------------------------------------------------

- name: Create recovery-exec user on target nodes
  ansible.builtin.user:
    name: "{{ recovery_exec_user }}"
    shell: /bin/sh
    create_home: true
    password: "!"
    comment: "Recovery SSH landing account"
    groups: systemd-journal
    append: true
  loop: "{{ recovery_exec_targets }}"
  loop_control:
    loop_var: target_item
  delegate_to: "{{ target_item.name }}"
  become: true

- name: Create .ssh directory on target nodes
  ansible.builtin.file:
    path: "/home/{{ recovery_exec_user }}/.ssh"
    state: directory
    owner: "{{ recovery_exec_user }}"
    group: "{{ recovery_exec_user }}"
    mode: "0700"
  loop: "{{ recovery_exec_targets }}"
  loop_control:
    loop_var: target_item
  delegate_to: "{{ target_item.name }}"
  become: true

- name: Deploy investigate dispatch script on target nodes
  ansible.builtin.template:
    src: recovery-investigate-dispatch.sh.j2
    dest: /usr/local/sbin/recovery-investigate-dispatch.sh
    owner: root
    group: root
    mode: "0755"
  loop: "{{ recovery_exec_targets }}"
  loop_control:
    loop_var: target_item
  delegate_to: "{{ target_item.name }}"
  become: true

- name: Deploy action script on target nodes
  ansible.builtin.template:
    src: recovery-action.sh.j2
    dest: /usr/local/sbin/recovery-action.sh
    owner: root
    group: root
    mode: "0755"
  loop: "{{ recovery_exec_targets }}"
  loop_control:
    loop_var: target_item
  delegate_to: "{{ target_item.name }}"
  become: true

- name: Deploy sudoers for recovery-exec on target nodes
  ansible.builtin.template:
    src: sudoers-recovery-exec-target.j2
    dest: /etc/sudoers.d/recovery-exec
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  loop: "{{ recovery_exec_targets }}"
  loop_control:
    loop_var: target_item
  delegate_to: "{{ target_item.name }}"
  become: true

- name: Register investigate key in authorized_keys (forced command = dispatch script)
  ansible.posix.authorized_key:
    user: "{{ recovery_exec_user }}"
    key: "{{ _investigate_pubkey.content | b64decode | trim }}"
    key_options: >-
      command="/usr/local/sbin/recovery-investigate-dispatch.sh",no-agent-forwarding,no-X11-forwarding,no-port-forwarding,no-pty
    state: present
  loop: "{{ recovery_exec_targets }}"
  loop_control:
    loop_var: target_item
  delegate_to: "{{ target_item.name }}"
  become: true

- name: Register action key in authorized_keys (forced command = action script)
  ansible.posix.authorized_key:
    user: "{{ recovery_exec_user }}"
    key: "{{ _action_pubkey.content | b64decode | trim }}"
    key_options: >-
      command="/usr/local/sbin/recovery-action.sh",no-agent-forwarding,no-X11-forwarding,no-port-forwarding,no-pty
    state: present
  loop: "{{ recovery_exec_targets }}"
  loop_control:
    loop_var: target_item
  delegate_to: "{{ target_item.name }}"
  become: true

# ---------------------------------------------------------------------------
# known_hosts on ansy/quory for both keys
# ---------------------------------------------------------------------------

- name: Add target host keys to recovery-exec known_hosts
  ansible.builtin.known_hosts:
    name: "{{ target_item.host }}"
    key: "{{ lookup('pipe', 'ssh-keyscan -H ' + target_item.host) }}"
    path: "{{ recovery_exec_ssh_dir }}/known_hosts"
    state: present
  loop: "{{ recovery_exec_targets }}"
  loop_control:
    loop_var: target_item
  become: true

- name: Set known_hosts ownership
  ansible.builtin.file:
    path: "{{ recovery_exec_ssh_dir }}/known_hosts"
    owner: "{{ recovery_exec_user }}"
    group: "{{ recovery_exec_user }}"
    mode: "0644"
  become: true
