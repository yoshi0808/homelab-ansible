---
recovery_exec_user: recovery-exec
recovery_exec_home: /home/recovery-exec
recovery_exec_ssh_dir: /home/recovery-exec/.ssh
recovery_exec_codex_dir: /home/recovery-exec/.codex
recovery_exec_workspace: /var/lib/recovery-exec/workspace
recovery_exec_investigate_key: /home/recovery-exec/.ssh/id_recovery_investigate
recovery_exec_action_key: /home/recovery-exec/.ssh/id_recovery_action
recovery_exec_codex_bin: /usr/bin/codex
recovery_exec_codex_wrapper: /usr/local/bin/codex-exec-wrapper
recovery_exec_codex_model: gpt-5.5

# Set to false to skip target node setup (e.g. when target is unreachable)
recovery_exec_setup_targets: true

# Per-node investigation and action configuration.
# investigate_services: services for which check/journal-<svc>/status are allowed.
# action_services:      services restarted by the action wrapper (all at once).
recovery_exec_targets:
  - name: authy
    host: authy.internal
    investigate_services:
      - freeradius
      - sshd
    investigate_extra:
      - name: radius-port
        cmd: "ss -ltnup | grep -E '1812|1813' || echo 'no RADIUS ports listening'"
      - name: radius-config-check
        cmd: "sudo freeradius -XC 2>&1"
    action_services:
      - freeradius
  - name: monnie
    host: monnie.internal
    investigate_services:
      - prometheus
      - grafana-server
      - loki
      - unpoller
    investigate_extra:
      - name: prometheus-targets
        cmd: "curl -fsS --max-time 10 http://localhost:9090/api/v1/targets || echo 'prometheus-targets: request failed or timed out'"
      - name: grafana-health
        cmd: "curl -fsS --max-time 10 https://monnie.internal:3000/api/health || echo 'grafana-health: request failed or timed out'"
      - name: loki-health
        cmd: "curl -fsS --max-time 10 http://localhost:3100/metrics | head -10 || echo 'loki-health: request failed or timed out'"
      - name: unpoller-config
        cmd: "systemctl show unpoller --property=ExecStart --no-pager; echo '---'; ss -ltnup | grep 9130 || echo 'port 9130 not listening'"
    action_services:
      - prometheus
      - grafana-server
      - loki
      - unpoller
