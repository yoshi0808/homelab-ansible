---
# Reference node. Its own NTP sync (chronyc tracking) is checked first;
# if it is not synchronized, the whole check aborts (the rest of the
# targets are not even connected to).
time_sync_check_reference_host: quory

# Hosts that run chrony and are reachable via the normal ann-key SSH
# connection. quory itself is also checked the same way (chronyc tracking),
# but kept out of this list / out of time_sync_check_targets since it has
# its own dedicated Phase 1 gate above.
time_sync_check_chrony_hosts:
  - pve1
  - pve2
  - ansy
  - monnie
  - authy

# Comparison targets (excludes the reference host itself).
# sophos-fw is checked via Advanced Shell (expect) reading /var/tslog/ntpclient.log;
# cloudkey is checked via password SSH (expect) reading `timedatectl status`.
time_sync_check_targets: "{{ time_sync_check_chrony_hosts + ['sophos-fw', 'cloudkey'] }}"

# For chrony-based hosts only: warn when chrony's own measured System time
# offset (its own statistically-tracked NTP offset, not a value we measure
# ourselves over the network) exceeds this.
time_sync_check_threshold_ms: 500

# Timeout for the expect-based SSH sessions (Sophos / CloudKey).
time_sync_check_ssh_timeout: 60

# How many trailing lines of /var/tslog/ntpclient.log to inspect on Sophos.
time_sync_check_sophos_log_lines: 5

# Sophos's ntpclient runs once daily. If /var/tslog/ntpclient.log hasn't been
# touched within this many hours, treat it as stale (ntpclient itself may have
# stopped running) even if its last logged line was a success.
time_sync_check_sophos_max_age_hours: 30

# CloudKey connection target (DNS name; see core.md §3 - no IP literals).
cloudkey_host: cloudkey.internal
