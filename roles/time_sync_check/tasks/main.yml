---
# time_sync_check: homelab 主要ホストの NTP 同期状態チェック。
# read-only。各ホストでの状態取得は command/expect のみで行い、
# 正常/異常判定・fail制御は本ファイル(Ansible tasks側)で行う(core.md §7)。
#
# 設計方針(quory基準の生時刻比較方式からの転換):
# 当初は quory の時刻と各ホストの時刻をSSH/HTTPで一回取得して差分を計算する方式を
# 検討したが、ローカル・実機検証の結果、SSH接続確立やHTTPのDateヘッダー(秒精度)
# 自体の測定誤差(数百ms〜数秒)が、検出したい時刻ズレと同程度かそれ以上になることが
# 判明した。実機調査で、対象ホストがいずれも自分自身のNTP同期状態を自己報告できる
# ことを確認できたため(chrony / systemd-timesyncd / ntpclientログ)、各ホスト自身の
# 自己診断結果を収集する方式に変更した。これにより、各ホストが長期間統計的に測定した
# (ミリ秒未満の精度を持つ)結果を使えるため、検出精度はむしろ向上する。
# 経緯は docs/ai/reviews/time_sync_check/2026-06-23_006_implement.md を参照。

# ---------------------------------------------------------------------------
# Phase 1: quory自身のNTP同期状態を確認する。同期できていない場合は他ホストへの
# 接続を一切行わずにここで中断する(基準が信頼できないため)。
# quoryのみを対象にした収集・判定を完了させてから Abort 判定を行う。他のchrony
# ホストの収集はこの後の Phase 2 でのみ行う(quory判定前に他ホストへ接続しない)。
# ---------------------------------------------------------------------------
- name: Check and judge quory chrony tracking
  ansible.builtin.include_tasks: check_chrony.yml
  when: inventory_hostname == time_sync_check_reference_host

- name: Abort and notify if quory NTP status could not be collected
  when: not (hostvars[time_sync_check_reference_host].time_sync_collected | default(false))
  run_once: true
  delegate_to: localhost
  block:
    - name: Send Slack notification (quory NTP status could not be collected)
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
      vars:
        slack_channel: "alerts"
        slack_status: "error"
        slack_title: "[time_sync_check] ERROR - quory NTP status could not be collected"
        slack_message: |
          基準ノード {{ time_sync_check_reference_host }} の chronyc tracking 結果を
          収集できなかったため、time_sync_check を中断しました。
          他ホストへの接続は行っていません。
          (接続失敗・コマンド失敗・出力解析失敗のいずれか。NTP同期異常とは別の問題です)

          詳細: {{ hostvars[time_sync_check_reference_host].time_sync_detail | default('(no detail)') }}
      when: not ansible_check_mode

    - name: Fail because reference node status could not be collected
      ansible.builtin.fail:
        msg: >-
          quory の NTP 状態を収集できなかったため、time_sync_check を中断しました。
          他ホストの確認は実施していません。

- name: Abort and notify if quory NTP is not synchronized
  when:
    - hostvars[time_sync_check_reference_host].time_sync_collected | default(false)
    - not (hostvars[time_sync_check_reference_host].time_sync_synced | default(false))
  run_once: true
  delegate_to: localhost
  block:
    - name: Send Slack notification (quory NTP not synchronized)
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
      vars:
        slack_channel: "alerts"
        slack_status: "critical"
        slack_title: "[time_sync_check] CRITICAL - quory NTP not synchronized"
        slack_message: |
          基準ノード {{ time_sync_check_reference_host }} の chronyc tracking が
          同期異常を示しているため、time_sync_check を中断しました。
          他ホストへの接続は行っていません。

          詳細: {{ hostvars[time_sync_check_reference_host].time_sync_detail | default('(no detail)') }}
      when: not ansible_check_mode

    - name: Fail because reference node time is not trustworthy
      ansible.builtin.fail:
        msg: >-
          quory の NTP 同期が異常なため、time_sync_check を中断しました。
          他ホストの確認は実施していません。

# 以降のタスクはすべて、quoryのNTPが正常な場合のみ実行する。
# (synced=falseの場合、各収集タスクは when ガードによりスキップされ、
#  対象ホストへの接続自体が発生しない)

# ---------------------------------------------------------------------------
# Phase 2: pve1/pve2/ansy/monnie/authy の chrony tracking を確認する。
# ---------------------------------------------------------------------------
- name: Check and judge chrony tracking (other chrony-based hosts)
  ansible.builtin.include_tasks: check_chrony.yml
  when:
    - hostvars[time_sync_check_reference_host].time_sync_synced | default(false)
    - inventory_hostname in time_sync_check_chrony_hosts

# ---------------------------------------------------------------------------
# Phase 3 (Sophos): SSH -> Advanced Shell経由 (メニュー "5"->"3", 終了 exit->"0"->"0")
# sophos_trim role の遷移ロジックを流用する。sophos-fw には offset を自己報告する
# NTPクライアントが存在しない(独自ntpclient実装、ログは絶対時刻のみ)ため、
# quoryとのdate直接比較で代替する(2026-06-25、自己報告方式から変更)。
#
# 精度上の注意: ansible.builtin.expect はメニュー遷移全体を1タスクとして実行する
# ため、コントローラー側のbefore/after計測はSSH接続〜メニュー操作〜date取得〜exit
# の全体区間を挟むことになり、単純な1コマンドの往復よりかなり長くなる
# (実機計測で前後の幅を time_sync_detail に記録し、Slack通知にも残す)。
# このSSH往復遅延が誤差として直接混入するため、sophos-fw専用に他ホストより
# 大きい閾値(time_sync_check_sophos_threshold_ms)を設けている。
# ---------------------------------------------------------------------------
- name: Record controller time before Sophos SSH session
  ansible.builtin.set_fact:
    # Seconds-only (not %3N): the controller may run uutils-coreutils (Rust),
    # whose `date +%s%3N` silently mis-truncates the nanosecond digits. The
    # bracket already spans multiple seconds (Advanced Shell menu round
    # trip), so second-level precision here does not add meaningful error.
    time_sync_sophos_t_before_ms: "{{ ((lookup('pipe', 'date +%s')) | int) * 1000 }}"
  delegate_to: localhost
  check_mode: false
  when:
    - hostvars[time_sync_check_reference_host].time_sync_synced | default(false)
    - inventory_hostname == 'sophos-fw'

- name: Check current time (Sophos via Advanced Shell, direct date comparison)
  ansible.builtin.expect:
    command: >-
      ssh
      -i {{ ansible_ssh_private_key_file | replace('~', lookup('env', 'HOME')) }}
      -o StrictHostKeyChecking=accept-new
      {{ ansible_user }}@{{ ansible_host }}
    responses:
      'Select Menu Number \[0-7\]:':
        - "5"
        - "0"
      'Select Menu Number \[0-4\]:':
        - "3"
        - "0"
      '# ':
        - "echo __SOPHOS_NOW__:$(date +%s%3N); echo __DATE_RC__:$?"
        - "exit"
    timeout: "{{ time_sync_check_ssh_timeout }}"
  delegate_to: localhost
  register: time_sync_sophos_raw
  no_log: true
  ignore_errors: true
  check_mode: false
  when:
    - hostvars[time_sync_check_reference_host].time_sync_synced | default(false)
    - inventory_hostname == 'sophos-fw'

- name: Record controller time after Sophos SSH session
  ansible.builtin.set_fact:
    # See "before" task above for why this is seconds-only, not %3N.
    time_sync_sophos_t_after_ms: "{{ ((lookup('pipe', 'date +%s')) | int) * 1000 }}"
  delegate_to: localhost
  check_mode: false
  when:
    - hostvars[time_sync_check_reference_host].time_sync_synced | default(false)
    - inventory_hostname == 'sophos-fw'

- name: Judge time sync status (Sophos, direct date comparison)
  ansible.builtin.set_fact:
    time_sync_collected: "{{ _rc_found and (_rc | int) == 0 and _remote_found }}"
    time_sync_synced: >-
      {{ _rc_found and (_rc | int) == 0 and _remote_found
         and ((_offset_ms | abs) <= time_sync_check_sophos_threshold_ms) }}
    time_sync_offset_ms: "{{ _offset_ms }}"
    time_sync_detail: >-
      {{ ('offset=' ~ (_offset_ms | round(0) | int) ~ 'ms (SSH往復 約' ~ _rtt_ms ~ 'ms、date直接比較。往復遅延が誤差として混入)')
         if _remote_found else '(date +%s%3N の出力を解析できなかった)' }}
  vars:
    _rc_match: >-
      {{ (time_sync_sophos_raw.stdout | default('') | regex_search('__DATE_RC__:([0-9]+)', '\1') | default([], true) | first) | default('', true) }}
    _rc_found: "{{ _rc_match | length > 0 }}"
    _rc: "{{ _rc_match | default('1', true) }}"
    _remote_match: >-
      {{ (time_sync_sophos_raw.stdout | default('') | regex_search('__SOPHOS_NOW__:([0-9]+)', '\1') | default([], true) | first) | default('', true) }}
    _remote_found: "{{ _remote_match | length > 0 }}"
    _remote_ms: "{{ _remote_match | default('0', true) | int }}"
    _midpoint_ms: "{{ ((time_sync_sophos_t_before_ms | default(0, true) | int) + (time_sync_sophos_t_after_ms | default(0, true) | int)) / 2 }}"
    _rtt_ms: "{{ (time_sync_sophos_t_after_ms | default(0, true) | int) - (time_sync_sophos_t_before_ms | default(0, true) | int) }}"
    _offset_ms: "{{ (_remote_ms - _midpoint_ms) if _remote_found else 0 }}"
  when:
    - hostvars[time_sync_check_reference_host].time_sync_synced | default(false)
    - inventory_hostname == 'sophos-fw'
  no_log: true

# ---------------------------------------------------------------------------
# Phase 4 (CloudKey): 通常SSH(パスワード認証)。cloudkey_ssh_user/cloudkey_ssh_password
# は inventories/vars/cloudkey.yml (Vault) から読み込む。実ホストではないため
# run_once + delegate_to: localhost + delegate_facts: true で localhost の
# hostvars に保存する(register結果自体は delegate_facts の対象外のため、
# 正規化済みfactだけをここで明示的に保存する)。
# ---------------------------------------------------------------------------
- name: Check NTP sync status (CloudKey via password SSH)
  ansible.builtin.expect:
    command: >-
      ssh
      -o StrictHostKeyChecking=accept-new
      -o PreferredAuthentications=keyboard-interactive,password
      -o PubkeyAuthentication=no
      {{ cloudkey_ssh_user }}@{{ cloudkey_host }}
    responses:
      '(?i)password:':
        - "{{ cloudkey_ssh_password }}"
      '# ':
        - "timedatectl timesync-status; echo __NTP_STATUS_RC__:$?"
        - "exit"
    timeout: "{{ time_sync_check_ssh_timeout }}"
  delegate_to: localhost
  run_once: true
  register: time_sync_cloudkey_raw
  no_log: true
  ignore_errors: true
  check_mode: false
  when: hostvars[time_sync_check_reference_host].time_sync_synced | default(false)

- name: Judge NTP sync status (CloudKey)
  ansible.builtin.set_fact:
    time_sync_collected: "{{ _rc_found and (_rc | int) == 0 and _offset_found }}"
    time_sync_synced: >-
      {{ _rc_found and (_rc | int) == 0 and _offset_found
         and ((_offset_ms | abs) <= time_sync_check_threshold_ms) }}
    time_sync_offset_ms: "{{ _offset_ms }}"
    time_sync_detail: "{{ _offset_line }}"
  vars:
    _rc_match: >-
      {{ (time_sync_cloudkey_raw.stdout | default('') | regex_search('__NTP_STATUS_RC__:([0-9]+)', '\1') | default([], true) | first) | default('', true) }}
    _rc_found: "{{ _rc_match | length > 0 }}"
    _rc: "{{ _rc_match | default('1', true) }}"
    _offset_num_match: >-
      {{ (time_sync_cloudkey_raw.stdout | default('') | regex_search('Offset:\s*([+-]?[0-9.]+)(us|ms|s)\b', '\1') | default([], true) | first) | default('', true) }}
    _offset_unit_match: >-
      {{ (time_sync_cloudkey_raw.stdout | default('') | regex_search('Offset:\s*([+-]?[0-9.]+)(us|ms|s)\b', '\2') | default([], true) | first) | default('', true) }}
    _offset_found: "{{ (_offset_num_match | length > 0) and (_offset_unit_match | length > 0) }}"
    _offset_ms: >-
      {{ ((_offset_num_match | float) / 1000) if (_offset_found and _offset_unit_match == 'us')
         else ((_offset_num_match | float) * 1000) if (_offset_found and _offset_unit_match == 's')
         else (_offset_num_match | float) if _offset_found
         else 0 }}
    _offset_line: >-
      {{ ((time_sync_cloudkey_raw.stdout | default('') | regex_search('Offset:.*')) | default('(no timesync-status output / offset not parseable)', true)) | trim }}
  delegate_to: localhost
  delegate_facts: true
  run_once: true
  no_log: true
  when: hostvars[time_sync_check_reference_host].time_sync_synced | default(false)

# ---------------------------------------------------------------------------
# Phase 5 / Phase 6: 各対象ホストの自己報告結果を集約し、判定する
# (quoryのNTPが正常な場合のみ)
# ---------------------------------------------------------------------------
- name: Build and judge time sync report
  when: hostvars[time_sync_check_reference_host].time_sync_synced | default(false)
  run_once: true
  delegate_to: localhost
  block:
    - name: Initialize comparison results
      ansible.builtin.set_fact:
        time_sync_results: []

    - name: Compute per-target health
      ansible.builtin.set_fact:
        time_sync_results: "{{ time_sync_results + [{'host': item, 'collected': _collected, 'ok': _ok, 'detail': _detail}] }}"
      vars:
        _hv: "{{ hostvars['localhost'] if item == 'cloudkey' else hostvars[item] }}"
        _collected: "{{ _hv.time_sync_collected | default(false) }}"
        _synced: "{{ _hv.time_sync_synced | default(false) }}"
        _ok: "{{ _collected and _synced }}"
        _detail: "{{ _hv.time_sync_detail | default('(no detail)') }}"
      loop: "{{ time_sync_check_targets }}"
      loop_control:
        label: "{{ item }}"

    - name: Classify warning and error hosts
      ansible.builtin.set_fact:
        time_sync_warning_hosts: "{{ time_sync_results | selectattr('collected') | rejectattr('ok') | list }}"
        time_sync_error_hosts: "{{ time_sync_results | rejectattr('collected') | list }}"

    - name: Print time sync summary
      ansible.builtin.debug:
        msg:
          - "Reference : {{ time_sync_check_reference_host }} ({{ hostvars[time_sync_check_reference_host].time_sync_detail }})"
          - "Results   : {{ time_sync_results }}"
          - "Warnings  : {{ time_sync_warning_hosts | map(attribute='host') | list }}"
          - "Errors    : {{ time_sync_error_hosts | map(attribute='host') | list }}"

    - name: Send Slack notification (NTP not synced and/or collection errors)
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
      vars:
        slack_channel: "alerts"
        slack_status: "{{ 'error' if time_sync_error_hosts | length > 0 else 'warning' }}"
        slack_title: >-
          [time_sync_check] {{ 'ERROR' if time_sync_error_hosts | length > 0 else 'WARNING' }}
        slack_message: |
          基準ノード: {{ time_sync_check_reference_host }} ({{ hostvars[time_sync_check_reference_host].time_sync_detail }})

          NTP同期異常ホスト:
          {% for r in time_sync_warning_hosts %}
          - {{ r.host }}: {{ r.detail }}
          {% else %}
          (なし)
          {% endfor %}
          接続/収集エラー:
          {% for r in time_sync_error_hosts %}
          - {{ r.host }}
          {% else %}
          (なし)
          {% endfor %}
      when:
        - not ansible_check_mode
        - (time_sync_warning_hosts | length > 0) or (time_sync_error_hosts | length > 0)

    - name: Fail if collection errors occurred
      ansible.builtin.fail:
        msg: >-
          time_sync_check: 以下のホストでNTP状態取得に失敗しました:
          {{ time_sync_error_hosts | map(attribute='host') | join(', ') }}
      when: time_sync_error_hosts | length > 0
