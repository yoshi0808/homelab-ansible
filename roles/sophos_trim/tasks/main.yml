---
- name: "[tester_mode] Plan-only: show intended Sophos trim and stop"
  when: tester_mode | default(false) | bool
  block:
    - name: Show planned Sophos trim
      ansible.builtin.debug:
        msg:
          - "[tester_mode] plan-only — 実変更は行いません"
          - "操作 : Sophos SSD fstrim"
          - "対象 : {{ inventory_hostname }}"
          - "接続 : SSH → Advanced Shell (メニュー 5→3)"
          - "コマンド: fstrim -v /var; fstrim -v /content"
          - "通知 : skip_notifications=true のため送信しません"
    - name: End play (tester_mode)
      ansible.builtin.meta: end_play

- name: Run SSD trim via interactive SSH
  ansible.builtin.expect:
    command: >-
      ssh
      -i {{ ansible_ssh_private_key_file | replace('~', lookup('env', 'HOME')) }}
      -o StrictHostKeyChecking=accept-new
      {{ ansible_user }}@{{ ansible_host }}
    responses:
      'Select Menu Number \[0-7\]:':
        - "5"
        - "0"
      'Select Menu Number \[0-4\]:':
        - "3"
        - "0"
      '# ':
        - "fstrim -v /var; echo __SOPHOS_TRIM_VAR_RC__:$?"
        - "fstrim -v /content; echo __SOPHOS_TRIM_CONTENT_RC__:$?"
        - "exit"
    timeout: "{{ sophos_trim_timeout }}"
    echo: true
  delegate_to: localhost
  register: trim_result
  ignore_errors: true

- name: Log fstrim output
  ansible.builtin.debug:
    msg: "{{ trim_result.stdout_lines | default([]) }}"

- name: Set trim status
  ansible.builtin.set_fact:
    trim_status: >-
      {{
        'SUCCESS'
        if (
          trim_result.rc is defined
          and trim_result.rc == 0
          and '__SOPHOS_TRIM_VAR_RC__:0' in (trim_result.stdout | default(''))
          and '__SOPHOS_TRIM_CONTENT_RC__:0' in (trim_result.stdout | default(''))
        )
        else 'FAILED'
      }}

- name: Send Slack notification
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
  vars:
    slack_channel: "{{ 'alerts' if trim_status == 'FAILED' else 'info' }}"
    slack_status: "{{ 'error' if trim_status == 'FAILED' else 'ok' }}"
    slack_title: "[Sophos Trim] {{ trim_status }} - {{ inventory_hostname }}"
    slack_message: |
      Host: {{ inventory_hostname }}
      Status: {{ trim_status }}

      Output:
      {{ trim_result.stdout | default('(no output)') }}

- name: Fail if trim failed
  ansible.builtin.fail:
    msg: "SSD Trim failed on {{ inventory_hostname }}: rc={{ trim_result.rc | default('N/A') }}"
  when: trim_status == 'FAILED'
