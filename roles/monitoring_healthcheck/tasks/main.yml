---
- name: Run healthcheck and classify results
  ansible.builtin.include_tasks: check.yml

- name: Ensure report directory exists
  ansible.builtin.file:
    path: "{{ monitoring_healthcheck_report_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Save report
  ansible.builtin.copy:
    content: "{{ monitoring_report | to_nice_json }}"
    dest: "{{ monitoring_healthcheck_report_dir }}/{{ inventory_hostname }}_{{ ansible_facts['date_time']['iso8601_basic_short'] }}.json"
  delegate_to: localhost
  become: false

- name: Send Slack notification
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
  vars:
    slack_channel: "alerts"
    slack_status: "{{ 'critical' if monitoring_criticals | length > 0 else 'warning' }}"
    slack_title: "[Monitoring Healthcheck] {{ monitoring_report.result.status }} - {{ inventory_hostname }}"
    slack_message: |
      Host    : {{ inventory_hostname }}
      Status  : {{ monitoring_report.result.status }}

      Criticals:
      {% for item in monitoring_criticals %}
      - {{ item }}
      {% else %}
      (none)
      {% endfor %}
      Warnings:
      {% for item in monitoring_warnings %}
      - {{ item }}
      {% else %}
      (none)
      {% endfor %}
  when:
    - monitoring_criticals | length > 0 or monitoring_warnings | length > 0
    - not (skip_notifications | default(false) | bool)

- name: Fail if critical
  ansible.builtin.fail:
    msg: "CRITICAL on {{ inventory_hostname }}: {{ monitoring_criticals | join(', ') }}"
  when: monitoring_criticals | length > 0
