---
# Per-host vars (set in host_vars or playbook -e):
#   recovery_trigger_target: e.g. "authy" or "monnie"
#   recovery_trigger_units:  list of systemd units to add OnFailure= to
#
# quory connection
recovery_trigger_quory_host: quory.internal
recovery_trigger_quory_user: trigger

# SSH key on this client host
recovery_trigger_key_dir: /etc/recovery
recovery_trigger_key_path: "{{ recovery_trigger_key_dir }}/id_trigger_{{ recovery_trigger_target }}"

# Where to register the public key (on quory, managed by recovery_trigger role)
recovery_trigger_quory_authorized_keys: "/home/trigger/.ssh/authorized_keys"
