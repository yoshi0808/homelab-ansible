---
# recovery_trigger_client: authy/monnie-side setup
#
# Required vars:
#   recovery_trigger_target  — "authy" or "monnie"
#   recovery_trigger_units   — list of systemd units to attach OnFailure= to
#
# Steps:
#   1. Create key directory on client
#   2. Generate SSH keypair on client (private key never leaves the host)
#   3. Fetch public key back to control node
#   4. Register public key in quory's trigger user authorized_keys (forced command)
#   5. Deploy recovery-notify-quory@.service on client
#   6. Deploy OnFailure= drop-in override for each target unit
#   7. Reload systemd

- name: Assert required vars are defined
  ansible.builtin.assert:
    that:
      - recovery_trigger_target is defined
      - recovery_trigger_target in ['authy', 'monnie', 'sophos-fw']
      - recovery_trigger_units is defined
      - recovery_trigger_units | length > 0
    fail_msg: "recovery_trigger_target and recovery_trigger_units must be set"

- name: Create key directory
  ansible.builtin.file:
    path: "{{ recovery_trigger_key_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true

- name: Generate SSH keypair (ed25519, on client — private key stays here)
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -t ed25519 -N ''
      -C "recovery-trigger-{{ recovery_trigger_target }}"
      -f {{ recovery_trigger_key_path }}
    creates: "{{ recovery_trigger_key_path }}"
  become: true

- name: Lock down private key permissions
  ansible.builtin.file:
    path: "{{ recovery_trigger_key_path }}"
    owner: root
    group: root
    mode: "0600"
  become: true

- name: Fetch public key from client
  ansible.builtin.slurp:
    src: "{{ recovery_trigger_key_path }}.pub"
  register: _rtc_pubkey_raw
  become: true

- name: Register public key in quory trigger user authorized_keys (forced command)
  ansible.posix.authorized_key:
    user: trigger
    key: "{{ _rtc_pubkey_raw.content | b64decode | trim }}"
    key_options: >-
      command="/usr/local/bin/recovery-trigger.sh {{ recovery_trigger_target }}",no-agent-forwarding,no-X11-forwarding,no-port-forwarding,no-pty
    state: present
  delegate_to: quory
  become: true

- name: Ensure /root/.ssh exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true

- name: Add quory host key to root known_hosts (StrictHostKeyChecking=yes requires this)
  ansible.builtin.known_hosts:
    name: "{{ recovery_trigger_quory_host }}"
    key: "{{ lookup('pipe', 'ssh-keyscan -H ' + recovery_trigger_quory_host) }}"
    path: /root/.ssh/known_hosts
    state: present
  become: true

- name: Deploy recovery-notify-quory@.service
  ansible.builtin.template:
    src: recovery-notify-quory@.service.j2
    dest: /etc/systemd/system/recovery-notify-quory@.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd

- name: Create drop-in directory for each target unit
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}.d"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ recovery_trigger_units }}"
  become: true

- name: Deploy OnFailure= drop-in override for each target unit
  ansible.builtin.template:
    src: recovery_trigger_override.conf.j2
    dest: "/etc/systemd/system/{{ item }}.d/recovery-trigger.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ recovery_trigger_units }}"
  become: true
  notify: Reload systemd
