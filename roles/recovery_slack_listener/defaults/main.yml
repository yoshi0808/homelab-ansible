---
recovery_slack_listener_user: recovery-slack
recovery_slack_listener_key_dir: /etc/recovery
recovery_slack_listener_install_dir: /opt/recovery-slack-listener
recovery_slack_listener_script: /usr/local/bin/recovery-slack-listener

recovery_slack_quory_host: quory.internal
recovery_slack_trigger_user: trigger

recovery_slack_targets:
  - authy
  - monnie
  - sophos-fw

recovery_slack_status_user: recovery-slack
recovery_slack_sophos_host: sophos-fw.internal
recovery_slack_status_targets:
  - name: authy
    host: authy.internal
    script: /usr/local/sbin/radius-healthcheck.sh
  - name: monnie
    host: monnie.internal
    script: /usr/local/sbin/monitoring-healthcheck.sh

recovery_slack_claude_path: /usr/local/bin/claude
recovery_slack_claude_ws: /etc/recovery/claude-ws
recovery_slack_max_turns: 6
