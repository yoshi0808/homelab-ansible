---
# recovery_trigger: quory-side setup
#
# Creates:
#   - homelab-ansible group (shared between yoshi and recovery-runner)
#   - recovery-runner user: no shell, no sudo — sole purpose is running the pipeline
#   - Copies of SSH keys + vault pass into recovery-runner's home
#     (group_vars use ~/... so expanding to recovery-runner's home works correctly)
#   - trigger user: receives SSH forced-command connections from authy/monnie
#   - recovery-trigger.sh / recovery-pipeline.sh in /usr/local/bin/
#   - sudoers: trigger → recovery-runner (NOPASSWD for pipeline script only)
#   - reports/ setgid so recovery-runner can write reports alongside yoshi

# ---------------------------------------------------------------------------
# Shared groups + users
# ---------------------------------------------------------------------------

- name: Create homelab-ansible group
  ansible.builtin.group:
    name: homelab-ansible
    state: present
  become: true

- name: Create homelab-recovery group (trigger + recovery-runner share lock/count dirs)
  ansible.builtin.group:
    name: homelab-recovery
    state: present
  become: true

- name: Create recovery-runner user (nologin, no sudo)
  ansible.builtin.user:
    name: recovery-runner
    shell: /usr/sbin/nologin
    create_home: true
    password: "!"
    groups: "homelab-ansible,homelab-recovery"
    append: true
    comment: "Autonomous recovery pipeline runner (no sudo)"
  become: true

- name: Add yoshi to homelab-ansible group
  ansible.builtin.user:
    name: yoshi
    groups: homelab-ansible
    append: true
  become: true

# ---------------------------------------------------------------------------
# recovery-runner credentials
# ~/.ssh/ and ~/.ansible/vault/ paths mirror yoshi's layout so
# group_vars (~/.ssh/id_ann) and ansible.cfg (~/.ansible/vault/...) expand correctly
# ---------------------------------------------------------------------------

- name: Create recovery-runner .ssh directory
  ansible.builtin.file:
    path: /home/recovery-runner/.ssh
    state: directory
    owner: recovery-runner
    group: recovery-runner
    mode: "0700"
  become: true

- name: Copy SSH keys for Ansible remote connections
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/home/recovery-runner/.ssh/{{ item.dest }}"
    remote_src: true
    owner: recovery-runner
    group: recovery-runner
    mode: "0600"
  loop:
    - { src: /home/yoshi/.ssh/id_ann, dest: id_ann }
    - { src: /home/yoshi/.ssh/id_rsa_sophos, dest: id_rsa_sophos }
  become: true

- name: Add recovery target host keys to recovery-runner known_hosts
  ansible.builtin.known_hosts:
    name: "{{ item }}"
    key: "{{ lookup('pipe', 'ssh-keyscan -H ' + item) }}"
    path: /home/recovery-runner/.ssh/known_hosts
    state: present
  loop:
    - pve1.internal
    - pve2.internal
    - authy.internal
    - monnie.internal
    - ansy.internal
  become: true

- name: Create recovery-runner vault directory
  ansible.builtin.file:
    path: /home/recovery-runner/.ansible/vault
    state: directory
    owner: recovery-runner
    group: recovery-runner
    mode: "0700"
  become: true

- name: Copy vault password file
  ansible.builtin.copy:
    src: /home/yoshi/.ansible/vault/homelab_vault_pass
    dest: /home/recovery-runner/.ansible/vault/homelab_vault_pass
    remote_src: true
    owner: recovery-runner
    group: recovery-runner
    mode: "0600"
  become: true

# ---------------------------------------------------------------------------
# yoshi home traversal — recovery-runner needs to cd into homelab-ansible repo
# mode 0711: others can traverse (x) but cannot list (no r)
# ---------------------------------------------------------------------------

- name: Allow recovery-runner to traverse yoshi home to reach ansible repo
  ansible.builtin.file:
    path: /home/yoshi
    mode: "0711"
  become: true

# ---------------------------------------------------------------------------
# reports/ setgid — new subdirectories/files inherit homelab-ansible group
# so recovery-runner can write reports alongside yoshi
# ---------------------------------------------------------------------------

- name: Set homelab-ansible group + setgid on reports directory
  ansible.builtin.file:
    path: /home/yoshi/homelab-ansible/reports
    state: directory
    group: homelab-ansible
    mode: "02775"
  become: true

# ---------------------------------------------------------------------------
# trigger user (SSH entry point)
# ---------------------------------------------------------------------------

- name: Create trigger user (no password, forced-command only)
  ansible.builtin.user:
    name: "{{ recovery_trigger_user }}"
    shell: /bin/sh
    create_home: true
    password: "!"
    groups: homelab-recovery
    append: true
    comment: "Autonomous recovery trigger (SSH forced-command only)"
  become: true

- name: Ensure trigger user .ssh directory exists
  ansible.builtin.file:
    path: "/home/{{ recovery_trigger_user }}/.ssh"
    state: directory
    owner: "{{ recovery_trigger_user }}"
    group: "{{ recovery_trigger_user }}"
    mode: "0700"
  become: true

# ---------------------------------------------------------------------------
# State and log directories
# ---------------------------------------------------------------------------

- name: Create state and log directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ recovery_trigger_state_base }}",           group: root,              mode: "0755" }
    - { path: "{{ recovery_trigger_state_base }}/mute",      group: root,              mode: "0755" }
    - { path: "{{ recovery_trigger_state_base }}/counts",    group: homelab-recovery,  mode: "0775" }
    - { path: "{{ recovery_trigger_run_base }}",             group: homelab-recovery,  mode: "0775" }
    - { path: "{{ recovery_trigger_log_dir }}",              group: homelab-recovery,  mode: "0775" }
  become: true

# ---------------------------------------------------------------------------
# Scripts
# ---------------------------------------------------------------------------

- name: Deploy recovery-trigger.sh (template — embeds pipeline user)
  ansible.builtin.template:
    src: recovery-trigger.sh.j2
    dest: "{{ recovery_trigger_script_dir }}/recovery-trigger.sh"
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy recovery-pipeline.sh
  ansible.builtin.copy:
    src: recovery-pipeline.sh
    dest: "{{ recovery_trigger_script_dir }}/recovery-pipeline.sh"
    owner: root
    group: root
    mode: "0755"
  become: true

# ---------------------------------------------------------------------------
# sudoers: trigger → recovery-runner, pipeline script only
# ---------------------------------------------------------------------------

- name: Configure sudoers for trigger → recovery-runner (pipeline only)
  ansible.builtin.copy:
    content: |
      # Autonomous recovery: trigger user may run pipeline as recovery-runner only
      {{ recovery_trigger_user }} ALL=({{ recovery_trigger_pipeline_user }}) NOPASSWD: {{ recovery_trigger_script_dir }}/recovery-pipeline.sh *
    dest: /etc/sudoers.d/homelab-recovery-trigger
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
  become: true
