---
proxmox_evacuate_report_dir: "{{ reports_base_dir }}/proxmox-evacuate"

# Seconds to wait for maintenance mode to become active (lrm <node>: maintenance mode)
proxmox_evacuate_maintenance_timeout: 120

# Poll interval in seconds while waiting for maintenance mode activation
proxmox_evacuate_maintenance_poll_interval: 5

# Seconds to wait for HA to evacuate VMs after maintenance mode is enabled
proxmox_evacuate_ha_timeout: 300

# Poll interval in seconds while waiting for HA evacuation
proxmox_evacuate_ha_poll_interval: 10

# Allow live-migrating QEMU VMs that have local (non-shared) disks.
# When true, --with-local-disks is appended to qm migrate.
# Default is false per proxmox_patch_policy.md (5.6): evacuations must stop
# when a VM uses local-only storage so a human can decide.
# Override to true in group_vars or playbook vars for environments where
# local-disk live migration is explicitly approved (e.g. local-zfs homelabs).
proxmox_evacuate_allow_local_disk_migration: false
