---
# Evacuate all VMs/CTs from target_node to destination_node before patch apply.
#
# Usage:
#   ansible-playbook -i inventories/homelab/hosts.yml playbooks/proxmox_evacuate_node.yml \
#     -e target_node=pve2
#
# target_node: pve1 or pve2 (required)
# destination_node: auto-derived as the opposite node (pve1 <-> pve2)
#
# Steps:
#   1. Validate target_node
#   2. Healthcheck on destination_node (must be OK before evacuation)
#   3. Evacuate target_node (healthcheck + migrate non-HA VMs + maintenance mode + HA wait)

- name: Validate target_node
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Assert target_node is pve1 or pve2
      ansible.builtin.assert:
        that:
          - target_node is defined
          - target_node in ['pve1', 'pve2']
        fail_msg: "target_node must be 'pve1' or 'pve2', got: '{{ target_node | default('undefined') }}'"

- name: Healthcheck on destination_node
  hosts: "{{ 'pve1' if target_node == 'pve2' else 'pve2' }}"
  gather_facts: true
  become: true
  tasks:
    - name: Run healthcheck on destination node
      ansible.builtin.include_role:
        name: proxmox_healthcheck

    - name: Abort if destination healthcheck is not OK
      ansible.builtin.fail:
        msg: >-
          Destination node {{ inventory_hostname }} healthcheck {{ proxmox_report.result.status }}.
          Cannot evacuate target node to an unhealthy destination.
      when: proxmox_report.result.status != 'OK'

- name: Evacuate target_node
  hosts: "{{ target_node }}"
  gather_facts: true
  become: true
  vars:
    destination_node: "{{ 'pve1' if target_node == 'pve2' else 'pve2' }}"
  roles:
    - proxmox_evacuate_node
