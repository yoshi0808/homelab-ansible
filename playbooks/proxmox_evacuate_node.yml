---
# Evacuate all VMs/CTs from target_node to destination_node before patch apply.
#
# Usage:
#   ansible-playbook -i inventories/homelab/hosts.yml playbooks/proxmox_evacuate_node.yml \
#     -e target_node=pve2
#
# target_node: pve1 or pve2 (required)
# destination_node: auto-derived as the opposite node (pve1 <-> pve2)
#
# Steps:
#   1. Validate target_node
#   2. Healthcheck on destination_node (must be OK before evacuation)
#   3. Evacuate target_node (healthcheck + migrate non-HA VMs + maintenance mode + HA wait)

- name: Validate target_node
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Assert target_node is pve1 or pve2
      ansible.builtin.assert:
        that:
          - target_node is defined
          - target_node in ['pve1', 'pve2']
        fail_msg: "target_node must be 'pve1' or 'pve2', got: '{{ target_node | default('undefined') }}'"

    - name: "[tester_mode] Plan-only: show intended evacuation and stop"
      when: tester_mode | default(false) | bool
      block:
        - name: Show planned evacuation
          ansible.builtin.debug:
            msg:
              - "[tester_mode] plan-only — 実変更は行いません"
              - "操作  : proxmox_evacuate_node (qm migrate / pct migrate / maintenance mode)"
              - "対象  : {{ target_node }}"
              - "移行先: {{ 'pve1' if target_node == 'pve2' else 'pve2' }}"
              - "通知  : skip_notifications=true のため送信しません"
        - name: End play (tester_mode)
          ansible.builtin.meta: end_play

    - name: Set recovery mute for authy
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/recovery_mute/tasks/set.yml"
      vars:
        recovery_mute_target: authy
        recovery_mute_minutes: 120
        recovery_mute_reason: "proxmox_evacuate_node: {{ target_node }} evacuation in progress"

    - name: Set recovery mute for monnie
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/recovery_mute/tasks/set.yml"
      vars:
        recovery_mute_target: monnie
        recovery_mute_minutes: 120
        recovery_mute_reason: "proxmox_evacuate_node: {{ target_node }} evacuation in progress"

    - name: Set recovery mute for sophos-fw
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/recovery_mute/tasks/set.yml"
      vars:
        recovery_mute_target: sophos-fw
        recovery_mute_minutes: 120
        recovery_mute_reason: "proxmox_evacuate_node: {{ target_node }} evacuation in progress"

- name: Healthcheck on destination_node
  hosts: "{{ 'pve1' if target_node == 'pve2' else 'pve2' }}"
  gather_facts: true
  become: true
  tasks:
    - name: Run healthcheck on destination node
      ansible.builtin.include_role:
        name: proxmox_healthcheck

    - name: Abort if destination healthcheck is not OK
      ansible.builtin.fail:
        msg: >-
          Destination node {{ inventory_hostname }} healthcheck {{ proxmox_report.result.status }}.
          Cannot evacuate target node to an unhealthy destination.
      when: proxmox_report.result.status != 'OK'

- name: Evacuate target_node
  hosts: "{{ target_node }}"
  gather_facts: true
  become: true
  vars:
    destination_node: "{{ 'pve1' if target_node == 'pve2' else 'pve2' }}"
    skip_notifications: "{{ tester_mode | default(false) | bool }}"
  pre_tasks:
    - name: "[tester_mode] Plan-only: stop before evacuate role"
      when: tester_mode | default(false) | bool
      block:
        - name: End play (tester_mode — evacuate play)
          ansible.builtin.meta: end_play
  roles:
    - proxmox_evacuate_node
