---
# =============================================================================
# proxmox_patch_weekly_full.yml
# Rolling patch apply: pve2 → pve1
#
# Run from quory (control node, outside Proxmox cluster):
#   ansible-playbook -i inventories/homelab/hosts.yml \
#     playbooks/proxmox_patch_weekly_full.yml
#
# Flow:
#   0.  preflight: control node not on cluster
#   1.  healthcheck pve1 + pve2  (stop if not both OK)
#   2.  dry-run                  (PATCH_READY → continue; clean-skip rc=0 on
#                                 NO_UPDATES/MAINTENANCE_REQUIRED/MAJOR_UPGRADE_DETECTED;
#                                 fail on BLOCKED/UNKNOWN)
#   3.  evacuate pve2
#   4.  patch apply pve2
#   5.  post-patch healthcheck pve2
#   6.  restore pve2
#   7.  evacuate pve1
#   8.  patch apply pve1
#   9.  post-patch healthcheck pve1
#   10. restore pve1
#   11. summary mail
#
# unsafe: applies OS patches
# =============================================================================

# ---------------------------------------------------------------------------
# Step 0: Preflight - Verify control node is not on the Proxmox cluster
#
# If the Ansible controller (ansible_hostname) is a VM running on pve1/pve2,
# evacuate would migrate it mid-run, breaking this playbook.
# Must be run from quory (external, non-cluster host) instead.
# ansy may be on the cluster without issue when running from quory.
# ---------------------------------------------------------------------------
- name: Preflight - Verify control node is not on Proxmox cluster
  hosts: "{{ groups['proxmox'][0] }}"
  gather_facts: false
  become: true
  vars:
    proxmox_patch_weekly_full_allowed_controllers:
      - quory
  tasks:
    - name: Get cluster resources
      ansible.builtin.command:
        cmd: pvesh get /cluster/resources --output-format json
      register: _preflight_pvesh_raw
      changed_when: false

    - name: Build cluster VM name list and controller hostname
      ansible.builtin.set_fact:
        _controller_hostname: "{{ lookup('pipe', 'hostname -s') }}"
        _cluster_vm_names: >-
          {{ _preflight_pvesh_raw.stdout | from_json |
             selectattr('type', 'defined') |
             selectattr('type', 'equalto', 'qemu') |
             selectattr('name', 'defined') |
             map(attribute='name') |
             list }}

    - name: Abort if executing host is on cluster
      ansible.builtin.fail:
        msg: >-
          Executing host '{{ _controller_hostname }}' is running as a VM on the
          Proxmox cluster. proxmox_patch_weekly_full must be run from an external
          control node (e.g. quory), not from a VM on the cluster.
      when: _controller_hostname in _cluster_vm_names

    - name: Abort if executing host is a Proxmox node
      ansible.builtin.fail:
        msg: >-
          Executing host '{{ _controller_hostname }}' is a Proxmox node
          (inventory: {{ groups['proxmox'] | join(', ') }}).
          proxmox_patch_weekly_full must be run from an external control node
          (e.g. quory), not from pve1 or pve2 themselves.
      when: _controller_hostname in groups['proxmox']

    - name: Abort if executing host is not an allowed controller
      ansible.builtin.fail:
        msg: >-
          Executing host '{{ _controller_hostname }}' is not in the allowed
          controllers list ({{ proxmox_patch_weekly_full_allowed_controllers | join(', ') }}).
          proxmox_patch_weekly_full must be run from an allowed external control
          node. To override, use extra vars (JSON format to ensure list type):
          -e '{"proxmox_patch_weekly_full_allowed_controllers":["<hostname>"]}'
      when: _controller_hostname not in proxmox_patch_weekly_full_allowed_controllers

# ---------------------------------------------------------------------------
# Step 1a: Healthcheck both nodes
# ---------------------------------------------------------------------------
- import_playbook: proxmox_healthcheck.yml

# Step 1b: Stop if either node is not OK
- name: Abort if either node healthcheck is not OK
  hosts: proxmox
  gather_facts: false
  any_errors_fatal: true
  tasks:
    - name: Fail if healthcheck is not OK
      ansible.builtin.fail:
        msg: >-
          {{ inventory_hostname }} healthcheck is {{ proxmox_report.result.status }}.
          Both nodes must be OK before proceeding with weekly full patch.
      when: proxmox_report.result.status != 'OK'

# ---------------------------------------------------------------------------
# Step 2a: Dry-run (produces _final_status on groups['proxmox'][0])
#
# proxmox_patch_dryrun role sets _final_status with run_once + delegate_to:
# localhost but without delegate_facts: true, so the fact is stored on the
# run_once source host (groups['proxmox'][0]), not on localhost.
# ---------------------------------------------------------------------------
- import_playbook: proxmox_patch_dryrun.yml

# Step 2b: Handle dry-run status
#
# PATCH_READY            → continue to evacuate/patch/restore flow
# NO_UPDATES             → skip + normal exit (dry-run role already notified: info)
# MAINTENANCE_REQUIRED   → skip + normal exit (dry-run role already notified: warning)
# MAJOR_UPGRADE_DETECTED → skip + normal exit (dry-run role already notified: warning)
# BLOCKED                → fail (apt/dpkg broken, patch ops halted - manual action)
# UNKNOWN / other        → fail (unexpected state)
#
# Semaphore only has success/fail (no warning). For the warning-level skip
# statuses the dry-run role has already sent a Slack notification, so the job
# ends as a normal (success) exit instead of failing — failing would surface a
# false error in Semaphore even though patching was correctly skipped, not broken.
- name: Handle dry-run status - skip cleanly or abort on genuine error
  hosts: localhost
  gather_facts: false
  vars:
    _status: "{{ hostvars[groups['proxmox'][0]]['_final_status'] | default('UNKNOWN') }}"
    # Patching intentionally skipped AND the dry-run role already notified Slack
    # → end the job as a normal (success) exit, not a failure.
    _weekly_full_skip_statuses:
      - NO_UPDATES
      - MAINTENANCE_REQUIRED
      - MAJOR_UPGRADE_DETECTED
  tasks:
    - name: Set skip flag and end play cleanly (patch skipped, dry-run role already notified)
      when: _status in _weekly_full_skip_statuses
      block:
        - name: Set skip flag for subsequent plays
          ansible.builtin.set_fact:
            _weekly_full_skip: true

        - name: End this play (normal exit - patching intentionally skipped)
          ansible.builtin.meta: end_play

    - name: Fail if dry-run status is a genuine error or unexpected
      ansible.builtin.fail:
        msg: >-
          Dry-run status is {{ _status }}.
          Weekly full patch apply requires PATCH_READY (or a clean skip:
          {{ _weekly_full_skip_statuses | join(', ') }}). Stopping.
          (BLOCKED = apt/dpkg broken; UNKNOWN = unexpected - manual action required.)
      when: _status != 'PATCH_READY'

# ---------------------------------------------------------------------------
# Step 2c: Set recovery mute for the full patch window
#
# Set a 360-minute (6h) mute for all recovery targets once PATCH_READY is
# confirmed. The individual evacuate/patch_apply/restore sub-playbooks also
# set shorter mutes; the max() rule in recovery_mute/tasks/set.yml ensures
# those shorter windows never shorten this one.
# ---------------------------------------------------------------------------
- name: Set recovery mute for full patch window
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip if patching was not confirmed PATCH_READY
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['_weekly_full_skip'] | default(false)

    - name: "[tester_mode] Plan-only: show intended weekly full patch and stop"
      when: tester_mode | default(false) | bool
      block:
        - name: Show planned weekly full patch
          ansible.builtin.debug:
            msg:
              - "[tester_mode] plan-only — 実変更は行いません"
              - "操作  : proxmox_patch_weekly_full (pve2→pve1 ローリングパッチ)"
              - "フロー: evacuate pve2 → patch pve2 → restore pve2 → evacuate pve1 → patch pve1 → restore pve1"
              - "注意  : この play は停止しますが後続の import_playbook は評価されます"
              - "       各 import 先 playbook にも tester_mode gate があるため危険操作には到達しません"
              - "通知  : skip_notifications=true のため送信しません"
        - name: End play (tester_mode)
          ansible.builtin.meta: end_play

    - name: Set recovery mute for authy
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/recovery_mute/tasks/set.yml"
      vars:
        recovery_mute_target: authy
        recovery_mute_minutes: 360
        recovery_mute_reason: "proxmox_patch_weekly_full: full cluster patch in progress"

    - name: Set recovery mute for monnie
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/recovery_mute/tasks/set.yml"
      vars:
        recovery_mute_target: monnie
        recovery_mute_minutes: 360
        recovery_mute_reason: "proxmox_patch_weekly_full: full cluster patch in progress"

    - name: Set recovery mute for sophos-fw
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/recovery_mute/tasks/set.yml"
      vars:
        recovery_mute_target: sophos-fw
        recovery_mute_minutes: 360
        recovery_mute_reason: "proxmox_patch_weekly_full: full cluster patch in progress (WAN disruption during sophos-fw migration)"

# ---------------------------------------------------------------------------
# Step 3: Evacuate pve2
# ---------------------------------------------------------------------------
- import_playbook: proxmox_evacuate_node.yml
  when: not (hostvars['localhost']['_weekly_full_skip'] | default(false))
  vars:
    target_node: pve2

# ---------------------------------------------------------------------------
# Step 4: Patch apply pve2
# ---------------------------------------------------------------------------
- import_playbook: proxmox_patch_apply_node.yml
  when: not (hostvars['localhost']['_weekly_full_skip'] | default(false))
  vars:
    target_node: pve2

# ---------------------------------------------------------------------------
# Step 5: Post-patch healthcheck pve2
# ---------------------------------------------------------------------------
- name: pve2 post-patch healthcheck
  hosts: pve2
  gather_facts: false
  become: true
  tasks:
    - name: Skip if NO_UPDATES
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['_weekly_full_skip'] | default(false)

    - name: Gather facts for healthcheck role
      ansible.builtin.setup:

    - name: Run healthcheck on pve2
      ansible.builtin.include_role:
        name: proxmox_healthcheck

    - name: Abort if pve2 post-patch healthcheck is not OK
      ansible.builtin.fail:
        msg: >-
          pve2 post-patch healthcheck is {{ proxmox_report.result.status }}.
          Not proceeding to restore or pve1 patch.
      when: proxmox_report.result.status != 'OK'

# ---------------------------------------------------------------------------
# Step 6: Restore pve2
# ---------------------------------------------------------------------------
- import_playbook: proxmox_restore_vm_placement.yml
  when: not (hostvars['localhost']['_weekly_full_skip'] | default(false))
  vars:
    target_node: pve2

# ---------------------------------------------------------------------------
# Step 7: Evacuate pve1
# ---------------------------------------------------------------------------
- import_playbook: proxmox_evacuate_node.yml
  when: not (hostvars['localhost']['_weekly_full_skip'] | default(false))
  vars:
    target_node: pve1

# ---------------------------------------------------------------------------
# Step 8: Patch apply pve1
# ---------------------------------------------------------------------------
- import_playbook: proxmox_patch_apply_node.yml
  when: not (hostvars['localhost']['_weekly_full_skip'] | default(false))
  vars:
    target_node: pve1

# ---------------------------------------------------------------------------
# Step 9: Post-patch healthcheck pve1
# ---------------------------------------------------------------------------
- name: pve1 post-patch healthcheck
  hosts: pve1
  gather_facts: false
  become: true
  tasks:
    - name: Skip if NO_UPDATES
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['_weekly_full_skip'] | default(false)

    - name: Gather facts for healthcheck role
      ansible.builtin.setup:

    - name: Run healthcheck on pve1
      ansible.builtin.include_role:
        name: proxmox_healthcheck

    - name: Abort if pve1 post-patch healthcheck is not OK
      ansible.builtin.fail:
        msg: >-
          pve1 post-patch healthcheck is {{ proxmox_report.result.status }}.
          Restore may still be needed manually.
      when: proxmox_report.result.status != 'OK'

# ---------------------------------------------------------------------------
# Step 10: Restore pve1
# ---------------------------------------------------------------------------
- import_playbook: proxmox_restore_vm_placement.yml
  when: not (hostvars['localhost']['_weekly_full_skip'] | default(false))
  vars:
    target_node: pve1

# ---------------------------------------------------------------------------
# Step 11: Summary mail
# ---------------------------------------------------------------------------
- name: Send weekly full patch complete notification
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip if NO_UPDATES (notification already sent by dry-run role)
      ansible.builtin.meta: end_play
      when: _weekly_full_skip | default(false)

    - name: Send Slack notification
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
      vars:
        slack_channel: "patches"
        slack_status: "ok"
        slack_title: "[Proxmox Patch] Weekly Full Patch Complete - pve2/pve1"
        slack_message: |
          Proxmox weekly full patch apply が完了しました。

          実行日時: {{ lookup('pipe', 'date "+%Y-%m-%d %H:%M:%S %Z"') }}
          対象ノード: pve2 → pve1（順番に適用）

          pve2: 退避 → パッチ適用 → 復帰 完了
          pve1: 退避 → パッチ適用 → 復帰 完了
