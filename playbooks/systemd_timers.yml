---
# This playbook must be run FROM the host you want to configure.
# target_hosts selects the inventory group, but connection: local means tasks
# always execute on the Ansible controller itself — not via SSH to the inventory host.
#
# Typical usage:
#   quory: ansible-playbook playbooks/systemd_timers.yml
#   ansy:  ansible-playbook playbooks/systemd_timers.yml -e "target_hosts=dev_nodes"
- name: Configure Ansible systemd timers
  hosts: "{{ target_hosts | default('control_nodes') }}"
  gather_facts: false
  become: true
  connection: local
  vars:
    skip_notifications: "{{ tester_mode | default(false) | bool }}"
  pre_tasks:
    - name: "[tester_mode] Plan-only: show intended systemd timers config and stop"
      when: tester_mode | default(false) | bool
      block:
        - name: Show planned systemd timers config
          ansible.builtin.debug:
            msg:
              - "[tester_mode] plan-only — 実変更は行いません"
              - "操作 : systemd timer/service ユニット配置 + systemctl enable/start"
              - "対象 : {{ inventory_hostname }}"
        - name: End host (tester_mode)
          ansible.builtin.meta: end_host

  roles:
    - systemd_timers
