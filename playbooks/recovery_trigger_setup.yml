---
# Setup playbook for autonomous recovery trigger infrastructure.
# Run once to provision quory + authy + monnie.
#
# What this does:
#   1. quory: creates trigger user, deploys scripts, configures sudoers
#   2. authy: generates SSH keypair, deploys systemd units, registers key on quory
#   3. monnie: same as authy
#
# SSH host key verification:
#   Before running this playbook, ensure quory's host key is known on authy/monnie
#   (or set recovery_trigger_quory_known_host_key in host_vars).
#   The generated keypair StrictHostKeyChecking=yes requires the key to be present
#   in /root/.ssh/known_hosts on each client host.
#
# Usage:
#   ansible-playbook -i inventories/homelab/hosts.yml \
#     playbooks/recovery_trigger_setup.yml
#
# To update only quory-side (e.g. after script change):
#   ansible-playbook ... --limit quory
#
# To update only clients (e.g. after adding a new unit):
#   ansible-playbook ... --limit authy,monnie

# ---------------------------------------------------------------------------
# Play 1: quory — trigger user + scripts + directories + sudoers
# ---------------------------------------------------------------------------
- name: Setup recovery trigger on quory
  hosts: quory
  gather_facts: false
  become: true
  roles:
    - recovery_trigger

# ---------------------------------------------------------------------------
# Play 2: authy — SSH keypair + systemd drop-ins + register key on quory
# ---------------------------------------------------------------------------
- name: Setup recovery trigger client on authy
  hosts: authy
  gather_facts: false
  become: true
  vars:
    recovery_trigger_target: authy
    recovery_trigger_units:
      - freeradius.service
  roles:
    - recovery_trigger_client

# ---------------------------------------------------------------------------
# Play 3: monnie — SSH keypair + systemd drop-ins + register key on quory
# ---------------------------------------------------------------------------
- name: Setup recovery trigger client on monnie
  hosts: monnie
  gather_facts: false
  become: true
  vars:
    recovery_trigger_target: monnie
    recovery_trigger_units:
      - grafana-server.service
      - prometheus.service
      - loki.service
      - unpoller.service
  roles:
    - recovery_trigger_client
