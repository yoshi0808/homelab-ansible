---
# cert_renew_quory.yml - TLS certificate renewal for quory semaphore
# 変更系: 証明書配置・semaphore再起動あり
#
# 対象: quory (semaphore)
# systemd timerから実行する。semaphore再起動を含むためsemaphoreからは実行しない。
# すべてlocal connectionで実行する。
#
# 通知: 証明書更新結果をメールで通知する（renewed/skipped/failed）。
# cleanup失敗時もメール通知後にPlaybook自体がfailするため、systemd unitのstateで検知できる。

- name: cert_renew_quory - verify execution host
  hosts: localhost
  gather_facts: true
  connection: local
  tasks:
    - name: Ensure this playbook is running on quory
      ansible.builtin.assert:
        that:
          - ansible_hostname == 'quory'
        fail_msg: >-
          cert_renew_quory.yml must be run on quory only
          (current host: {{ ansible_hostname }}).

- name: cert_renew_quory - prepare CA key on quory
  hosts: quory
  gather_facts: false
  become: true
  connection: local
  tasks:
    - name: Run prepare_ca tasks
      ansible.builtin.import_role:
        name: homelab_cert_renew
        tasks_from: prepare_ca

- name: cert_renew_quory - issue and deploy quory cert
  hosts: quory
  gather_facts: false
  become: true
  connection: local
  vars:
    cert_renew_ca_host: localhost
    force_renew: true
  tasks:
    - name: Run issue tasks
      ansible.builtin.import_role:
        name: homelab_cert_renew
        tasks_from: issue

    - name: Run deploy_semaphore tasks
      ansible.builtin.import_role:
        name: homelab_cert_renew
        tasks_from: deploy_semaphore

- name: cert_renew_quory - cleanup CA key from quory
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    cert_renew_ca_host: localhost
  tasks:
    - name: Run cleanup tasks
      ansible.builtin.import_role:
        name: homelab_cert_renew
        tasks_from: cleanup

- name: cert_renew_quory - send completion notification
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    cert_renew_ca_host: localhost
  tasks:
    - name: Build renewal summary
      ansible.builtin.set_fact:
        cert_renew_summary: |
          {% if hostvars['quory'].cert_needs_renewal is not defined %}
          quory: check FAILED
          {% else %}
          {% set needs_renewal = hostvars['quory'].cert_needs_renewal | bool %}
          {% set renewed = hostvars['quory'].cert_renewed | default(false) | bool %}
          {% set deployed = hostvars['quory'].cert_deployed | default(false) | bool %}
          {% if not needs_renewal %}
          quory: skipped
          {% elif not renewed %}
          quory: issue FAILED
          {% elif deployed %}
          quory: renewed and deployed
          {% else %}
          quory: renewed but deploy FAILED
          {% endif %}
          {% endif %}
          CA cleanup: {{ cert_cleanup_status | default('OK') }}

    - name: Send Slack notification
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
      vars:
        slack_channel: "{{ 'alerts' if 'FAILED' in cert_renew_summary else 'info' }}"
        slack_status: "{{ 'error' if 'FAILED' in cert_renew_summary else 'ok' }}"
        slack_title: "[cert_renew_quory] Certificate renewal completed"
        slack_message: |
          TLS certificate renewal run (quory) completed.

          Results:
          {{ cert_renew_summary }}
          Executed at: {{ lookup('pipe', 'date +%Y-%m-%dT%H:%M:%S+09:00') }}

    - name: Fail if CA cleanup was not successful
      ansible.builtin.fail:
        msg: "CA cleanup {{ cert_cleanup_status }}: /run/semaphore-ca/ may still exist"
      when: cert_cleanup_status is defined
