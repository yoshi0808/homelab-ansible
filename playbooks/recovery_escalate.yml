---
# Sends a human escalation notification to the Slack alerts channel.
# Called by recovery-pipeline.sh when all recovery attempts have failed,
# or when flapping is detected (§9: 3+ triggers in 24h).
#
# Required extra vars:
#   target          — recovery target name (e.g. "authy")
#   escalate_reason — human-readable explanation of why escalation occurred

- name: Send recovery escalation notification
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Assert required vars are defined
      ansible.builtin.assert:
        that:
          - target is defined
          - target | length > 0
          - escalate_reason is defined

    - name: Send Slack escalation notification
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
      vars:
        slack_channel: "alerts"
        slack_status: "error"
        slack_title: "[autonomous_recovery] エスカレーション - {{ target }}"
        slack_message: |
          対象    : {{ target }}
          理由    : {{ escalate_reason }}
          時刻    : {{ lookup('pipe', "TZ='Asia/Tokyo' date '+%Y-%m-%dT%H:%M:%S+09:00'") }}
          対応    : 手動調査・復旧が必要です。自動対応を終了しました。
