      ansible.builtin.meta: end_host
      when: not reboot_required

    - name: Set recovery mute before reboot
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/recovery_mute/tasks/set.yml"
      vars:
        recovery_mute_target: "{{ inventory_hostname }}"
        recovery_mute_minutes: 30
        recovery_mute_reason: "ubuntu_nightly: {{ inventory_hostname }} reboot in progress"

    - name: Send reboot start notification
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
      vars:
        slack_channel: "info"
        slack_status: "info"
        slack_title: "[ubuntu_nightly] Reboot started - {{ inventory_hostname }}"
        slack_message: |
          Host: {{ inventory_hostname }}
          Action: Reboot started
          Time: {{ ansible_facts["date_time"]["iso8601"] }}

    - block:
        - name: Reboot host
          ansible.builtin.reboot:
            reboot_timeout: 300

        - name: Check prometheus service status
          ansible.builtin.command:
            cmd: systemctl is-active prometheus
          register: prometheus_active
          changed_when: false
          failed_when: false
          retries: 12
          delay: 5
          until: prometheus_active.stdout.strip() == 'active'
          ignore_errors: true

        - name: Check grafana-server service status
          ansible.builtin.command:
            cmd: systemctl is-active grafana-server
          register: grafana_active
          changed_when: false
          failed_when: false
          retries: 12
          delay: 5
          until: grafana_active.stdout.strip() == 'active'
          ignore_errors: true

        - name: Check loki service status
          ansible.builtin.command:
            cmd: systemctl is-active loki
          register: loki_active
          changed_when: false
          failed_when: false
          retries: 12
          delay: 5
          until: loki_active.stdout.strip() == 'active'
          ignore_errors: true

        - name: Check 9090/tcp listening
          ansible.builtin.shell:
            cmd: ss -tlnH 'sport = :9090'
          register: port_9090_output
          changed_when: false
          failed_when: false
          retries: 12
          delay: 5
          until: port_9090_output.stdout | length > 0
          ignore_errors: true

        - name: Check 3000/tcp listening
          ansible.builtin.shell:
            cmd: ss -tlnH 'sport = :3000'
          register: port_3000_output
          changed_when: false
          failed_when: false
          retries: 12
          delay: 5
          until: port_3000_output.stdout | length > 0
          ignore_errors: true

        - name: Check 3100/tcp listening
          ansible.builtin.shell:
            cmd: ss -tlnH 'sport = :3100'
          register: port_3100_output
          changed_when: false
          failed_when: false
          retries: 12
          delay: 5
          until: port_3100_output.stdout | length > 0
          ignore_errors: true

        - name: Evaluate service and port results
          ansible.builtin.set_fact:
            nightly_criticals: "{{ []
              + ([] if prometheus_active.stdout.strip() == 'active'
                     else ['prometheus service is not active: ' + prometheus_active.stdout.strip()])
              + ([] if grafana_active.stdout.strip() == 'active'
                     else ['grafana-server service is not active: ' + grafana_active.stdout.strip()])
              + ([] if loki_active.stdout.strip() == 'active'
                     else ['loki service is not active: ' + loki_active.stdout.strip()])
              + ([] if port_9090_output.stdout | length > 0
                     else ['port 9090/tcp is not listening'])
              + ([] if port_3000_output.stdout | length > 0
                     else ['port 3000/tcp is not listening'])
              + ([] if port_3100_output.stdout | length > 0
                     else ['port 3100/tcp is not listening'])
              }}"

        - name: Gather facts after reboot
          ansible.builtin.setup:
            gather_subset:
              - date_time

        - name: Print post-reboot result
          ansible.builtin.debug:
            msg:
              - "Host       : {{ inventory_hostname }}"
              - "Result     : {{ 'CRITICAL' if nightly_criticals | length > 0 else 'OK' }}"
              - "prometheus : {{ prometheus_active.stdout.strip() }}"
              - "grafana    : {{ grafana_active.stdout.strip() }}"
              - "loki       : {{ loki_active.stdout.strip() }}"
              - "9090/tcp   : {{ 'listening' if port_9090_output.stdout | length > 0 else 'not listening' }}"
              - "3000/tcp   : {{ 'listening' if port_3000_output.stdout | length > 0 else 'not listening' }}"
              - "3100/tcp   : {{ 'listening' if port_3100_output.stdout | length > 0 else 'not listening' }}"
              - "Criticals  : {{ nightly_criticals }}"

        - name: Build result report
          ansible.builtin.set_fact:
            nightly_report:
              host: "{{ inventory_hostname }}"
              executed_at: "{{ lookup('pipe', 'date +%Y-%m-%dT%H:%M:%S+09:00') }}"
              reboot_required: true
              rebooted: true
              prometheus: "{{ prometheus_active.stdout.strip() }}"
              grafana: "{{ grafana_active.stdout.strip() }}"
              loki: "{{ loki_active.stdout.strip() }}"
              port_9090: "{{ 'listening' if port_9090_output.stdout | length > 0 else 'not listening' }}"
              port_3000: "{{ 'listening' if port_3000_output.stdout | length > 0 else 'not listening' }}"
              port_3100: "{{ 'listening' if port_3100_output.stdout | length > 0 else 'not listening' }}"
              criticals: "{{ nightly_criticals }}"
              result: "{{ 'CRITICAL' if nightly_criticals | length > 0 else 'OK' }}"

        - name: Save result report
          ansible.builtin.copy:
            content: "{{ nightly_report | to_nice_json }}"
            dest: "{{ nightly_report_dir }}/{{ inventory_hostname }}_{{ ansible_facts['date_time']['iso8601_basic_short'] }}.json"
          delegate_to: localhost
          become: false

