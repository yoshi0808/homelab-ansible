    skip_notifications: "{{ tester_mode | default(false) | bool }}"

  tasks:
    - name: Check reboot-required flag
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: Check if needrestart is available
      ansible.builtin.stat:
        path: /usr/sbin/needrestart
      register: needrestart_bin

    - name: Run needrestart in batch mode
      ansible.builtin.command:
        cmd: /usr/sbin/needrestart -b
      register: needrestart_output
      changed_when: false
      failed_when: false
      when: needrestart_bin.stat.exists

    - name: Evaluate reboot requirement
      ansible.builtin.set_fact:
        reboot_required: >-
          {{ reboot_flag.stat.exists
             or (needrestart_bin.stat.exists
                 and 'NEEDRESTART-KSTA: 3' in (needrestart_output.stdout | default(''))) }}

    - name: Ensure report directory exists
      ansible.builtin.file:
        path: "{{ nightly_report_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false

    - name: Build skipped report
      ansible.builtin.set_fact:
        nightly_report:
          host: "{{ inventory_hostname }}"
          executed_at: "{{ lookup('pipe', 'date +%Y-%m-%dT%H:%M:%S+09:00') }}"
          reboot_required: false
          rebooted: false
          result: "SKIPPED"
      when: not reboot_required

    - name: Save skipped report
      ansible.builtin.copy:
        content: "{{ nightly_report | to_nice_json }}"
        dest: "{{ nightly_report_dir }}/{{ inventory_hostname }}_{{ ansible_facts['date_time']['iso8601_basic_short'] }}.json"
      delegate_to: localhost
      become: false
      when: not reboot_required

    - name: End play if reboot is not required
      ansible.builtin.meta: end_host
      when: not reboot_required

    - name: "[tester_mode] Plan-only: show intended reboot and stop"
      when: tester_mode | default(false) | bool
      block:
        - name: Show planned reboot
          ansible.builtin.debug:
            msg:
              - "[tester_mode] plan-only — 実変更は行いません"
              - "reboot_required: {{ reboot_required }}"
              - "操作 : ansible.builtin.reboot (reboot_timeout=300)"
              - "対象 : {{ inventory_hostname }}"
              - "通知 : skip_notifications=true のため送信しません"
        - name: End host (tester_mode)
          ansible.builtin.meta: end_host

    - name: Set recovery mute before reboot
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/recovery_mute/tasks/set.yml"
      vars:
        recovery_mute_target: "{{ inventory_hostname }}"
        recovery_mute_minutes: 30
        recovery_mute_reason: "ubuntu_nightly: {{ inventory_hostname }} reboot in progress"

    - name: Send reboot start notification
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
      vars:
        slack_channel: "info"
        slack_status: "info"
        slack_title: "[ubuntu_nightly] Reboot started - {{ inventory_hostname }}"
        slack_message: |
          Host: {{ inventory_hostname }}
          Action: Reboot started
          Time: {{ ansible_facts["date_time"]["iso8601"] }}

    - block:
        - name: Reboot host
          ansible.builtin.reboot:
            reboot_timeout: 300

        - name: Wait for monitoring services to be ready after reboot
          ansible.builtin.wait_for:
            host: "{{ ansible_host }}"
            port: "{{ item }}"
            timeout: 120
            state: started
          delegate_to: localhost
          become: false
          loop:
            - 9090
            - 3000
            - 3100

        - name: Run monitoring healthcheck
          ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/monitoring_healthcheck/tasks/check.yml"

        - name: Gather facts after reboot
          ansible.builtin.setup:
            gather_subset:
              - date_time

        - name: Build result report
          ansible.builtin.set_fact:
            nightly_report:
              host: "{{ inventory_hostname }}"
              executed_at: "{{ lookup('pipe', 'date +%Y-%m-%dT%H:%M:%S+09:00') }}"
              reboot_required: true
              rebooted: true
              services: "{{ monitoring_report.services }}"
              ports: "{{ monitoring_report.ports }}"
              criticals: "{{ monitoring_criticals }}"
              result: "{{ monitoring_report.result.status }}"

        - name: Save result report
          ansible.builtin.copy:
            content: "{{ nightly_report | to_nice_json }}"
            dest: "{{ nightly_report_dir }}/{{ inventory_hostname }}_{{ ansible_facts['date_time']['iso8601_basic_short'] }}.json"
          delegate_to: localhost
          become: false

        - name: Send result notification
          ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
          vars:
            slack_channel: "{{ 'alerts' if monitoring_criticals | length > 0 else 'info' }}"
            slack_status: "{{ 'critical' if monitoring_criticals | length > 0 else 'ok' }}"
            slack_title: "[ubuntu_nightly] {{ monitoring_report.result.status }} - {{ inventory_hostname }}"
            slack_message: |
              Host: {{ inventory_hostname }}
              Result: {{ monitoring_report.result.status }}
              Time: {{ ansible_facts["date_time"]["iso8601"] }}

              Service:
                prometheus: {{ monitoring_report.services.prometheus }}
                grafana: {{ monitoring_report.services.grafana }}
                loki: {{ monitoring_report.services.loki }}
                unpoller: {{ monitoring_report.services.unpoller }}
                9090/tcp: {{ monitoring_report.ports.tcp_9090 }}
                3000/tcp: {{ monitoring_report.ports.tcp_3000 }}
                3100/tcp: {{ monitoring_report.ports.tcp_3100 }}

              Criticals:
              {% for item in monitoring_criticals %}
              - {{ item }}
              {% else %}
              (none)
              {% endfor %}

      rescue:
        - name: Send reboot failure notification
          ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common_slack/tasks/notify.yml"
          vars:
            slack_channel: "alerts"
            slack_status: "critical"
            slack_title: "[ubuntu_nightly] reboot FAILED - {{ inventory_hostname }}"
            slack_message: |
              Host: {{ inventory_hostname }}
              reboot タイムアウトまたは SSH 接続不能。手動確認が必要。
              Time: {{ lookup('pipe', 'date +%Y-%m-%dT%H:%M:%S+09:00') }}

        - name: Re-raise reboot failure
          ansible.builtin.fail:
            msg: "ubuntu_nightly: reboot or post-reboot check failed on {{ inventory_hostname }}"

    - name: Fail if critical
      ansible.builtin.fail:
        msg: "CRITICAL on {{ inventory_hostname }}: {{ monitoring_criticals | join(', ') }}"
      when: monitoring_criticals | default([]) | length > 0
