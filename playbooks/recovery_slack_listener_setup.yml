---
# Setup playbook for the Slack mention listener (policy §6.3).
# Run after adding vault_slack_socket_bot_token, vault_slack_socket_app_token,
# and vault_slack_authorized_user_id to inventories/vars/slack.yml.
#
# Usage:
#   ansible-playbook -i inventories/homelab/hosts.yml \
#     playbooks/recovery_slack_listener_setup.yml

- name: Setup recovery Slack listener on ansy
  hosts: ansy
  gather_facts: false
  become: true
  roles:
    - recovery_slack_listener
