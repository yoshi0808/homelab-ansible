---
# Deploy recovery-io (Slack I/O bridge) to ansy or quory.
#
# Development (ansy):
#   ansible-playbook playbooks/recovery_io_setup.yml -l ansy
#   # service is deployed but NOT enabled/auto-started; use systemctl start manually
#
# Production (quory):
#   ansible-playbook playbooks/recovery_io_setup.yml -l quory \
#     -e recovery_io_service_enabled=true
#
# Notes:
# - vault_slack_socket_bot_token, vault_slack_socket_app_token,
#   vault_slack_authorized_user_id must be set in inventories/vars/slack.yml
# - recovery_exec role must be deployed first (codex-exec-wrapper must exist)

- name: Deploy recovery-io (Slack I/O bridge)
  hosts: dev_nodes:control_nodes
  gather_facts: true
  become: true
  vars:
    skip_notifications: "{{ tester_mode | default(false) | bool }}"
  pre_tasks:
    - name: "[tester_mode] Plan-only: show intended recovery-io setup and stop"
      when: tester_mode | default(false) | bool
      block:
        - name: Show planned recovery-io setup
          ansible.builtin.debug:
            msg:
              - "[tester_mode] plan-only — 実変更は行いません"
              - "操作 : recovery-io サービス配置 + systemctl enable/start"
              - "対象 : {{ inventory_hostname }}"
        - name: End host (tester_mode)
          ansible.builtin.meta: end_host

  roles:
    - recovery_io
